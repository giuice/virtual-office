<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Virtual Office · Space Grid v3 (Tactile & Organic)</title>
    <style>
      :root {
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        --transition-speed: 0.4s;
        --ease-elastic: cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      * { box-sizing: border-box; }
      body {
        margin: 0; padding: 0; min-height: 100vh;
        background: var(--bg-color); color: var(--text-main);
        transition: background var(--transition-speed) ease, color var(--transition-speed) ease;
        overflow-x: hidden;
      }

      /* Fluid WebGL-like Mesh (Simulated with CSS for prototype) */
      .ambient-mesh {
        position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
        z-index: -1; background: var(--mesh-gradient);
        filter: blur(100px); opacity: 0.7;
        animation: mesh-drift 30s infinite alternate ease-in-out;
        pointer-events: none;
      }

      @keyframes mesh-drift {
        0% { transform: rotate(0deg) scale(1); }
        100% { transform: rotate(15deg) scale(1.2); }
      }

      .app-container {
        max-width: 1600px; margin: 0 auto; padding: 2rem;
        display: grid; grid-template-rows: auto auto 1fr auto; gap: 2rem;
      }

      header {
        display: flex; justify-content: space-between; align-items: flex-end;
        padding-bottom: 1rem; border-bottom: 1px solid var(--border-subtle);
      }

      h1 {
        font-size: 2.5rem; font-weight: 800; letter-spacing: -0.03em; margin: 0;
        background: var(--text-gradient); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
      }

      .subtitle { font-size: 1rem; color: var(--text-muted); max-width: 600px; margin-top: 0.5rem; line-height: 1.5; }

      .controls-bar {
        display: flex; gap: 1.5rem; align-items: center; flex-wrap: wrap;
        background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
        padding: 1rem; border-radius: 16px; border: 1px solid var(--glass-border);
        box-shadow: var(--glass-shadow); position: relative; overflow: hidden;
      }

      .control-group { display: flex; gap: 0.5rem; align-items: center; z-index: 2; }
      .label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-right: 0.5rem; font-weight: 600; }

      button {
        background: transparent; border: 1px solid var(--border-subtle); color: var(--text-main);
        padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 500;
        transition: all 0.2s var(--ease-elastic);
      }

      button:hover { background: var(--hover-bg); transform: translateY(-2px); }
      button.active {
        background: var(--active-bg); color: var(--active-text);
        border-color: var(--active-border); box-shadow: 0 4px 12px var(--active-shadow);
      }

      /* Grid System */
      .grid-canvas { display: grid; gap: 1.5rem; transition: all 0.5s ease; }

      .layout-orbit .grid-canvas { grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); }
      .layout-analyst .grid-canvas { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1rem; }
      .layout-cinema .grid-canvas { grid-template-columns: repeat(auto-fill, minmax(450px, 1fr)); }

      /* Space Card - Tactile Glassmorphism & Container Queries */
      .space-card {
        background: var(--card-bg); border: 1px solid var(--card-border);
        border-radius: 20px; padding: 1.5rem; position: relative; overflow: hidden;
        transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
        backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        container-type: inline-size; container-name: space;
        cursor: pointer;
      }

      /* SVG Noise Texture for tactile feel */
      .noise-overlay {
        position: absolute; inset: 0; z-index: 0; opacity: 0.04; pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      /* Dynamic Specular Highlight (Mouse tracking) */
      .glow-overlay {
        position: absolute; inset: 0; z-index: 1; pointer-events: none;
        background: radial-gradient(400px circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(255,255,255,0.08), transparent 40%);
        opacity: 0; transition: opacity 0.3s ease;
      }
      .space-card:hover .glow-overlay { opacity: 1; }

      .space-card:hover {
        transform: translateY(-4px) scale(1.01);
        box-shadow: var(--card-hover-shadow); border-color: var(--card-hover-border); z-index: 10;
      }

      .card-content { position: relative; z-index: 2; display: flex; flex-direction: column; gap: 1.25rem; height: 100%; }

      .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
      .space-name { font-size: 1.15rem; font-weight: 700; margin: 0; line-height: 1.2; letter-spacing: -0.01em; }
      .space-meta { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.35rem; font-weight: 500; }

      /* Organic Attention Beacon */
      .beacon-indicator {
        width: 12px; height: 12px; border-radius: 50%;
        background: var(--beacon-color); position: relative;
        box-shadow: 0 0 12px var(--beacon-glow);
      }

      .beacon-indicator.critical::before, .beacon-indicator.critical::after {
        content: ''; position: absolute; inset: -2px; border-radius: 50%;
        border: 2px solid var(--beacon-color);
        animation: organic-ripple 2.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) infinite;
      }
      .beacon-indicator.critical::after { animation-delay: 1.25s; }

      @keyframes organic-ripple {
        0% { transform: scale(1); opacity: 0.8; }
        100% { transform: scale(3.5); opacity: 0; }
      }

      .cinema-split { display: flex; flex-direction: column; gap: 1rem; flex-grow: 1; }
      .cinema-right { display: flex; flex-direction: row; justify-content: space-between; align-items: center; }

      .phase-pill {
        display: inline-flex; align-items: center; padding: 0.35rem 0.85rem; border-radius: 99px;
        font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
        background: var(--pill-bg); color: var(--pill-text); border: 1px solid var(--pill-border);
        box-shadow: inset 0 1px 2px rgba(255,255,255,0.1);
      }

      /* Expressive Avatars */
      .avatars-row { display: flex; align-items: center; margin-left: 0.5rem; }
      .avatar {
        width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--card-bg);
        margin-left: -10px; background-size: cover; background-position: center;
        transition: transform 0.3s var(--ease-elastic), box-shadow 0.3s ease; position: relative;
      }
      .avatar:hover { transform: translateY(-6px) scale(1.15); z-index: 5; box-shadow: 0 8px 16px rgba(0,0,0,0.3); }
      
      .avatar.speaking {
        box-shadow: 0 0 0 2px var(--card-bg), 0 0 0 4px var(--accent-color);
        animation: speaking-pulse 2s infinite;
      }
      @keyframes speaking-pulse {
        0% { box-shadow: 0 0 0 2px var(--card-bg), 0 0 0 4px var(--accent-color); }
        50% { box-shadow: 0 0 0 2px var(--card-bg), 0 0 0 6px rgba(0, 242, 255, 0.4); }
        100% { box-shadow: 0 0 0 2px var(--card-bg), 0 0 0 4px var(--accent-color); }
      }

      .log-stream {
        font-family: "JetBrains Mono", monospace; font-size: 0.75rem; color: var(--text-muted);
        background: var(--log-bg); padding: 0.85rem; border-radius: 10px;
        border-left: 3px solid var(--accent-color); line-height: 1.5;
        box-shadow: inset 0 2px 8px rgba(0,0,0,0.1);
      }

      /* Interactive Sparkline for Analyst View */
      .sparkline-wrapper { display: none; margin-top: auto; position: relative; }
      .sparkline-container {
        height: 32px; width: 100%; display: flex; align-items: flex-end; gap: 2px;
        cursor: crosshair; padding-top: 10px;
      }
      .sparkline-bar {
        flex: 1; background: var(--border-subtle); border-radius: 2px 2px 0 0;
        transition: background 0.2s, transform 0.2s; min-height: 4px;
      }
      .sparkline-bar:hover { background: var(--accent-color); transform: scaleY(1.2); transform-origin: bottom; }
      
      .sparkline-tooltip {
        position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
        background: var(--text-main); color: var(--bg-color); padding: 4px 8px;
        border-radius: 6px; font-size: 0.7rem; font-weight: bold; opacity: 0;
        pointer-events: none; transition: opacity 0.2s, transform 0.2s; white-space: nowrap; z-index: 20;
      }
      .sparkline-container:hover + .sparkline-tooltip { opacity: 1; transform: translate(-50%, -5px); }

      /* Layout Specific Overrides */
      .layout-analyst .sparkline-wrapper { display: block; }
      .layout-analyst .avatars-row { display: none; }
      .layout-analyst .space-card { padding: 1.25rem; }
      .layout-analyst .log-stream { display: none; } /* Maximize density */

      /* Container Queries for Cinema Mode */
      @container space (min-width: 400px) {
        .cinema-split { flex-direction: row; align-items: stretch; }
        .log-stream { flex: 1; margin: 0; display: flex; align-items: center; }
        .cinema-right { flex-direction: column; justify-content: space-between; align-items: flex-end; min-width: 120px; }
        .avatars-row { margin-left: 0; margin-top: 0.5rem; }
      }

      /* Themes (Same as v2, refined slightly) */
      [data-theme="neon"] {
        --bg-color: #050505; --text-main: #ffffff; --text-muted: #8b9bb4;
        --text-gradient: linear-gradient(to right, #00f2ff, #ff00ff);
        --mesh-gradient: radial-gradient(circle at 20% 20%, #2b00ff44, transparent 40%), radial-gradient(circle at 80% 80%, #ff009944, transparent 40%);
        --glass-bg: rgba(10, 10, 16, 0.5); --glass-border: rgba(255, 255, 255, 0.08); --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        --border-subtle: rgba(255, 255, 255, 0.12); --hover-bg: rgba(255, 255, 255, 0.1);
        --active-bg: rgba(0, 242, 255, 0.15); --active-text: #00f2ff; --active-border: #00f2ff; --active-shadow: rgba(0, 242, 255, 0.4);
        --card-bg: rgba(20, 20, 25, 0.4); --card-border: rgba(255, 255, 255, 0.06);
        --card-hover-border: rgba(255, 0, 255, 0.6); --card-hover-shadow: 0 12px 40px rgba(255, 0, 255, 0.15);
        --accent-color: #00f2ff; --pill-bg: rgba(0, 242, 255, 0.1); --pill-text: #00f2ff; --pill-border: rgba(0, 242, 255, 0.3);
        --log-bg: rgba(0, 0, 0, 0.6); --beacon-color: #00f2ff; --beacon-glow: rgba(0, 242, 255, 0.8);
      }

      [data-theme="zen"] {
        --bg-color: #f4f1ea; --text-main: #3d4c41; --text-muted: #7a8c7e;
        --text-gradient: linear-gradient(to right, #3d4c41, #5c7a66);
        --mesh-gradient: radial-gradient(circle at 50% 50%, #dce6d5, transparent 60%);
        --glass-bg: rgba(255, 255, 255, 0.4); --glass-border: rgba(61, 76, 65, 0.08); --glass-shadow: 0 4px 20px rgba(61, 76, 65, 0.05);
        --border-subtle: rgba(61, 76, 65, 0.1); --hover-bg: rgba(61, 76, 65, 0.05);
        --active-bg: #3d4c41; --active-text: #f4f1ea; --active-border: #3d4c41; --active-shadow: rgba(61, 76, 65, 0.2);
        --card-bg: rgba(255, 255, 255, 0.5); --card-border: rgba(255, 255, 255, 0.6);
        --card-hover-border: #8fa896; --card-hover-shadow: 0 12px 30px rgba(61, 76, 65, 0.08);
        --accent-color: #6b8c76; --pill-bg: #e8e4dc; --pill-text: #3d4c41; --pill-border: transparent;
        --log-bg: rgba(61, 76, 65, 0.05); --beacon-color: #d48c70; --beacon-glow: rgba(212, 140, 112, 0.4);
      }

      [data-theme="obsidian"] {
        --bg-color: #000000; --text-main: #e0e0e0; --text-muted: #888888;
        --text-gradient: linear-gradient(to bottom, #ffffff, #999999);
        --mesh-gradient: none;
        --glass-bg: rgba(20, 20, 20, 0.6); --glass-border: rgba(255, 255, 255, 0.08); --glass-shadow: 0 20px 50px rgba(0,0,0,0.9);
        --border-subtle: rgba(255, 255, 255, 0.1); --hover-bg: rgba(255, 255, 255, 0.05);
        --active-bg: #ffffff; --active-text: #000000; --active-border: #ffffff; --active-shadow: rgba(255, 255, 255, 0.2);
        --card-bg: rgba(10, 10, 10, 0.6); --card-border: rgba(255, 255, 255, 0.05);
        --card-hover-border: #444444; --card-hover-shadow: 0 10px 40px rgba(0,0,0,0.8);
        --accent-color: #ffffff; --pill-bg: #1a1a1a; --pill-text: #ffffff; --pill-border: #333333;
        --log-bg: #050505; --beacon-color: #ffffff; --beacon-glow: rgba(255, 255, 255, 0.3);
      }

      [data-theme="paper"] {
        --bg-color: #ffffff; --text-main: #111111; --text-muted: #666666;
        --text-gradient: none; --mesh-gradient: none;
        --glass-bg: rgba(255, 255, 255, 0.8); --glass-border: #e5e5e5; --glass-shadow: 0 2px 10px rgba(0,0,0,0.03);
        --border-subtle: #e5e5e5; --hover-bg: #f5f5f5;
        --active-bg: #111111; --active-text: #ffffff; --active-border: #111111; --active-shadow: rgba(0,0,0,0.1);
        --card-bg: rgba(255, 255, 255, 0.8); --card-border: #e5e5e5;
        --card-hover-border: #111111; --card-hover-shadow: 0 12px 40px rgba(0,0,0,0.06);
        --accent-color: #111111; --pill-bg: #f5f5f5; --pill-text: #111111; --pill-border: #d0d0d0;
        --log-bg: #f9f9f9; --beacon-color: #ff3b30; --beacon-glow: rgba(255, 59, 48, 0.2);
      }
    </style>
  </head>
  <body class="layout-orbit" data-theme="neon">
    <div class="ambient-mesh"></div>
    
    <div class="app-container">
      <header>
        <div>
          <h1>Virtual Office Unleashed</h1>
          <div class="subtitle">v3 Prototype: Tactile Glassmorphism, Organic Beacons & Semantic Zooming.</div>
        </div>
      </header>

      <div class="controls-bar">
        <div class="noise-overlay"></div>
        <div class="control-group">
          <span class="label">Reality</span>
          <button class="theme-btn active" onclick="setTheme('neon')">Neon Cyberpunk</button>
          <button class="theme-btn" onclick="setTheme('zen')">Zen Garden</button>
          <button class="theme-btn" onclick="setTheme('obsidian')">Obsidian Stealth</button>
          <button class="theme-btn" onclick="setTheme('paper')">Paper White</button>
        </div>
        <div style="flex-grow: 1"></div>
        <div class="control-group">
          <span class="label">Perspective</span>
          <button class="layout-btn active" onclick="setLayout('orbit')">Orbit</button>
          <button class="layout-btn" onclick="setLayout('analyst')">Analyst</button>
          <button class="layout-btn" onclick="setLayout('cinema')">Cinema</button>
        </div>
      </div>

      <div class="grid-canvas">
        <!-- Generated by JS -->
      </div>
    </div>

    <script>
      const spaces = [
        { name: "Strategy War Room", phase: "Decide", users: 6, critical: true, log: "Consensus reached on Q4 targets. Risk assessment pending." },
        { name: "Engineering Hive", phase: "Build", users: 14, critical: false, log: "Merge freeze in effect. Deploying hotfix to prod." },
        { name: "Design Studio", phase: "Ideate", users: 8, critical: false, log: "Moodboards updated. Reviewing typography assets." },
        { name: "Customer Success", phase: "Support", users: 12, critical: true, log: "Escalation: Enterprise client outage. War room active." },
        { name: "Zen Lounge", phase: "Rest", users: 3, critical: false, log: "Meditation session starting in 5m." },
        { name: "Executive Suite", phase: "Align", users: 4, critical: false, log: "Board deck review. Financials locked." },
        { name: "Marketing Hub", phase: "Launch", users: 9, critical: false, log: "Campaign assets live. Monitoring CTR." },
        { name: "Data Lab", phase: "Analyze", users: 5, critical: false, log: "Query optimization complete. Dashboard refreshing." }
      ];

      const avatars = [
        "https://i.pravatar.cc/100?img=1", "https://i.pravatar.cc/100?img=2", 
        "https://i.pravatar.cc/100?img=3", "https://i.pravatar.cc/100?img=4",
        "https://i.pravatar.cc/100?img=5", "https://i.pravatar.cc/100?img=8"
      ];

      function generateSparkline() {
        return Array(24).fill(0).map(() => {
          const height = Math.max(15, Math.random() * 100);
          return `<div class="sparkline-bar" style="height: ${height}%" onmouseover="updateTooltip(this, ${Math.round(height)})"></div>`;
        }).join('');
      }

      function renderGrid() {
        const container = document.querySelector('.grid-canvas');
        container.innerHTML = spaces.map(space => `
          <div class="space-card">
            <div class="noise-overlay"></div>
            <div class="glow-overlay"></div>
            
            <div class="card-content">
              <div class="card-header">
                <div>
                  <h3 class="space-name">${space.name}</h3>
                  <div class="space-meta">${space.users} Active · ${space.phase}</div>
                </div>
                <div class="beacon-indicator ${space.critical ? 'critical' : ''}"></div>
              </div>
              
              <div class="cinema-split">
                <div class="log-stream">
                  > ${space.log}
                </div>
                
                <div class="cinema-right">
                  <span class="phase-pill">${space.phase}</span>
                  <div class="avatars-row">
                    ${Array(Math.min(4, space.users)).fill(0).map((_, i) => 
                      `<div class="avatar ${i===0 ? 'speaking' : ''}" style="background-image: url('${avatars[i % avatars.length]}')"></div>`
                    ).join('')}
                    ${space.users > 4 ? `<div class="avatar" style="background: var(--pill-bg); color: var(--text-main); display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: bold; box-shadow: none;">+${space.users-4}</div>` : ''}
                  </div>
                </div>
              </div>

              <div class="sparkline-wrapper">
                <div class="sparkline-container">
                  ${generateSparkline()}
                </div>
                <div class="sparkline-tooltip">Activity: 0/m</div>
              </div>
            </div>
          </div>
        `).join('');

        // Attach mouse tracking for the dynamic glow
        document.querySelectorAll('.space-card').forEach(card => {
          card.addEventListener('mousemove', e => {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            card.style.setProperty('--mouse-x', `${x}px`);
            card.style.setProperty('--mouse-y', `${y}px`);
          });
        });
      }

      function updateTooltip(el, val) {
        const tooltip = el.parentElement.nextElementSibling;
        tooltip.textContent = `Activity: ${val}/m`;
      }

      function setTheme(theme) {
        document.body.setAttribute('data-theme', theme);
        document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
      }

      function setLayout(layout) {
        document.body.className = `layout-${layout}`;
        document.querySelectorAll('.layout-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
      }

      // Init
      renderGrid();
    </script>
  </body>
</html>
