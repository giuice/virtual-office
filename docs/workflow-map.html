<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Virtual Office Workflow Map</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f8fb;
      --panel: #ffffff;
      --panel-soft: #f0f4f8;
      --ink: #1d2939;
      --muted: #667085;
      --subtle: #98a2b3;
      --line: #d0d5dd;
      --active: #0f766e;
      --active-soft: #ccfbf1;
      --accent: #b42318;
      --accent-soft: #fee4e2;
      --api: #175cd3;
      --api-soft: #d1e9ff;
      --store: #7a2e0e;
      --store-soft: #ffead5;
      --context: #6941c6;
      --context-soft: #ebe9fe;
      --hook: #067647;
      --hook-soft: #dcfae6;
      --component: #b54708;
      --component-soft: #fef0c7;
      --route: #363f72;
      --route-soft: #e0eaff;
      --shadow: 0 14px 40px rgba(16, 24, 40, 0.10);
      --radius: 8px;
      --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --mono: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.45;
    }

    button {
      font: inherit;
    }

    .app {
      height: 100vh;
      min-height: 0;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      padding: 18px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .title-block {
      min-width: 260px;
    }

    .eyebrow {
      color: var(--active);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(24px, 3vw, 34px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .subtitle {
      color: var(--muted);
      max-width: 900px;
      margin-top: 7px;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .utility-button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: var(--radius);
      padding: 9px 11px;
      cursor: pointer;
      font-weight: 700;
    }

    .utility-button[aria-pressed="true"] {
      background: var(--active);
      color: #fff;
      border-color: var(--active);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(240px, 300px) minmax(620px, 1fr) minmax(300px, 390px);
      gap: 16px;
      padding: 16px;
      min-height: 0;
      overflow: hidden;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      min-width: 0;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    .sidebar-header,
    .detail-header {
      padding: 16px;
      border-bottom: 1px solid var(--line);
    }

    .sidebar-header h2,
    .detail-header h2 {
      font-size: 16px;
    }

    .sidebar-header p,
    .detail-header p {
      margin-top: 5px;
      color: var(--muted);
      font-size: 13px;
    }

    .flow-list {
      padding: 10px;
      display: grid;
      gap: 8px;
      overflow: auto;
      flex: 1;
      min-height: 0;
    }

    .flow-button {
      text-align: left;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: var(--radius);
      padding: 11px;
      cursor: pointer;
      display: grid;
      gap: 6px;
    }

    .flow-button:hover {
      border-color: var(--active);
    }

    .flow-button.active {
      border-color: var(--active);
      background: var(--active-soft);
      box-shadow: 0 0 0 2px rgba(15, 118, 110, 0.16);
    }

    .flow-button strong {
      display: block;
      color: var(--ink);
      font-size: 14px;
    }

    .flow-button span {
      color: var(--muted);
      display: block;
      font-size: 12px;
    }

    .flow-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border-radius: 999px;
      border: 1px solid rgba(15, 118, 110, 0.20);
      background: #fff;
      color: var(--active);
      padding: 3px 7px;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
    }

    .diagram-wrap {
      position: relative;
      overflow: auto;
      min-height: 0;
    }

    .diagram-surface {
      position: relative;
      min-width: 980px;
      padding: 16px;
    }

    .edge-layer {
      position: absolute;
      inset: 0;
      overflow: visible;
      pointer-events: none;
      z-index: 1;
    }

    .edge-label-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 3;
    }

    .nodes-grid {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: repeat(4, minmax(220px, 1fr));
      gap: 12px;
      align-items: start;
    }

    .lane {
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 10px;
      display: grid;
      gap: 8px;
      min-width: 0;
    }

    .lane h2 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      padding: 2px 4px 5px;
    }

    .node {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 10px;
      min-height: 86px;
      transition: border-color 150ms ease, box-shadow 150ms ease, opacity 150ms ease, transform 150ms ease;
      cursor: pointer;
      position: relative;
    }

    .node:hover {
      transform: translateY(-1px);
      border-color: var(--active);
    }

    .node.active {
      border-color: var(--active);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.16);
    }

    .node.dimmed {
      opacity: 0.34;
    }

    .node.selected {
      outline: 2px solid rgba(180, 35, 24, 0.40);
      outline-offset: 2px;
    }

    .kind {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 2px 7px;
      font-size: 10px;
      line-height: 1.4;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 7px;
    }

    .kind-route { color: var(--route); background: var(--route-soft); }
    .kind-component { color: var(--component); background: var(--component-soft); }
    .kind-context { color: var(--context); background: var(--context-soft); }
    .kind-hook { color: var(--hook); background: var(--hook-soft); }
    .kind-api { color: var(--api); background: var(--api-soft); }
    .kind-repository { color: var(--active); background: var(--active-soft); }
    .kind-store { color: var(--store); background: var(--store-soft); }
    .kind-service { color: var(--accent); background: var(--accent-soft); }

    .node-title {
      display: block;
      font-weight: 800;
      color: var(--ink);
      line-height: 1.2;
    }

    .node-path {
      color: var(--muted);
      font-family: var(--mono);
      font-size: 11px;
      margin-top: 5px;
      overflow-wrap: anywhere;
    }

    .chips {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .chip {
      border-radius: 999px;
      background: var(--panel-soft);
      color: var(--muted);
      font-size: 10px;
      padding: 2px 6px;
      white-space: nowrap;
      max-width: 150px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .step-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 23px;
      height: 23px;
      border-radius: 999px;
      background: var(--active);
      color: #fff;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 800;
    }

    .node.active .step-badge {
      display: flex;
    }

    .flow-edge {
      stroke: rgba(102, 112, 133, 0.38);
      stroke-width: 2;
      fill: none;
      transition: stroke 150ms ease, opacity 150ms ease, stroke-width 150ms ease;
    }

    .flow-edge.active {
      stroke: var(--active);
      stroke-width: 3.5;
    }

    .edge-label {
      position: absolute;
      max-width: 230px;
      transform: translate(-50%, -50%);
      border: 1px solid rgba(15, 118, 110, 0.26);
      background: rgba(255, 255, 255, 0.94);
      color: var(--ink);
      border-radius: var(--radius);
      padding: 6px 8px;
      font-size: 11px;
      box-shadow: 0 10px 24px rgba(16, 24, 40, 0.12);
    }

    .edge-label strong {
      color: var(--active);
      display: block;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 2px;
    }

    .detail {
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    .detail-body {
      padding: 14px 16px 16px;
      overflow: auto;
      flex: 1;
      min-height: 0;
    }

    .detail-section + .detail-section {
      margin-top: 18px;
    }

    .detail-section h3 {
      font-size: 13px;
      color: var(--ink);
      margin-bottom: 8px;
    }

    .step-list {
      display: grid;
      gap: 10px;
    }

    .step {
      display: grid;
      grid-template-columns: 28px 1fr;
      gap: 10px;
      align-items: start;
    }

    .step-number {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      background: var(--active-soft);
      color: var(--active);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 12px;
      border: 1px solid rgba(15, 118, 110, 0.22);
    }

    .step-content {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 9px;
      background: #fff;
    }

    .step-content strong {
      display: block;
      margin-bottom: 3px;
    }

    .step-content p {
      color: var(--muted);
      font-size: 13px;
    }

    .code {
      font-family: var(--mono);
      font-size: 12px;
      color: #344054;
      background: var(--panel-soft);
      border-radius: 6px;
      padding: 8px;
      overflow: auto;
      white-space: pre-wrap;
      border: 1px solid #e4e7ec;
    }

    .node-detail {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 10px;
      background: #fff;
    }

    .node-detail dt {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      font-weight: 800;
      letter-spacing: 0.05em;
      margin-top: 10px;
    }

    .node-detail dt:first-child {
      margin-top: 0;
    }

    .node-detail dd {
      margin: 4px 0 0;
      color: var(--ink);
    }

    .tabs {
      display: flex;
      gap: 6px;
      border-bottom: 1px solid var(--line);
      padding: 0 16px;
    }

    .tab {
      border: 0;
      border-bottom: 3px solid transparent;
      background: transparent;
      padding: 11px 5px 9px;
      cursor: pointer;
      color: var(--muted);
      font-weight: 800;
      font-size: 12px;
    }

    .tab.active {
      color: var(--active);
      border-bottom-color: var(--active);
    }

    .json-panel {
      display: none;
      margin: 0 16px 16px;
      max-height: 42vh;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #101828;
      color: #d0d5dd;
      padding: 12px;
      font-family: var(--mono);
      font-size: 11px;
      white-space: pre;
    }

    .json-panel.visible {
      display: block;
    }

    @media (max-width: 1180px) {
      .layout {
        grid-template-columns: minmax(220px, 280px) minmax(560px, 1fr);
      }

      .detail {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 860px) {
      .app {
        height: auto;
      }

      .topbar {
        position: static;
        align-items: flex-start;
        flex-direction: column;
      }

      .layout {
        display: block;
        padding: 10px;
        overflow: visible;
      }

      .sidebar,
      .diagram-wrap,
      .detail {
        margin-bottom: 12px;
      }

      .diagram-wrap {
        min-height: 520px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="title-block">
        <div class="eyebrow">Virtual Office architecture</div>
        <h1>Workflow Map</h1>
        <p class="subtitle">
          Click an action to highlight the packages and components involved, then inspect the payloads and handoffs that complete the flow.
        </p>
      </div>
      <div class="top-actions">
        <button class="utility-button" id="fit-active-button" type="button">Focus Active Flow</button>
        <button class="utility-button" id="json-toggle-button" type="button" aria-pressed="false">Show JSON</button>
      </div>
    </header>

    <main class="layout">
      <aside class="panel sidebar">
        <div class="sidebar-header">
          <h2>Actions</h2>
          <p>Each action is defined in the embedded JSON source.</p>
        </div>
        <div class="flow-list" id="flow-list"></div>
      </aside>

      <section class="panel diagram-wrap" id="diagram-wrap" aria-label="Workflow diagram">
        <div class="diagram-surface" id="diagram-surface">
          <svg class="edge-layer" id="edge-layer" aria-hidden="true"></svg>
          <div class="edge-label-layer" id="edge-label-layer"></div>
          <div class="nodes-grid" id="nodes-grid"></div>
        </div>
      </section>

      <aside class="panel detail">
        <div class="detail-header">
          <h2 id="detail-title">Flow details</h2>
          <p id="detail-summary"></p>
        </div>
        <div class="tabs" role="tablist" aria-label="Detail tabs">
          <button class="tab active" type="button" data-tab="steps">Steps</button>
          <button class="tab" type="button" data-tab="payloads">Payloads</button>
          <button class="tab" type="button" data-tab="package">Package</button>
        </div>
        <div class="detail-body" id="detail-body"></div>
        <pre class="json-panel" id="json-panel"></pre>
      </aside>
    </main>
  </div>

  <script type="application/json" id="workflow-data">
{
  "meta": {
    "title": "Virtual Office Workflow Map",
    "source": "Generated from local repo inspection on 2026-05-12",
    "jsonContract": "nodes define visible packages/components; flows define action buttons, steps, and edges."
  },
  "lanes": [
    {
      "id": "routes",
      "title": "Routes and pages",
      "nodes": [
        "authRoutes",
        "joinOnboardingRoutes",
        "dashboardRoutes",
        "adminRoutes"
      ]
    },
    {
      "id": "components",
      "title": "Feature components",
      "nodes": [
        "authComponents",
        "companyComponents",
        "floorPlanComponents",
        "modernFloorComponents",
        "messagingComponents",
        "profileComponents",
        "uiComponents"
      ]
    },
    {
      "id": "state",
      "title": "Contexts, hooks, and client APIs",
      "nodes": [
        "authContext",
        "companyContext",
        "presenceContext",
        "messagingContext",
        "audioCallingContexts",
        "queryHooks",
        "presenceHooks",
        "messagingHooks",
        "knockHooks",
        "uploadHooks",
        "clientApi"
      ]
    },
    {
      "id": "server",
      "title": "API route packages",
      "nodes": [
        "authApi",
        "usersApi",
        "companiesApi",
        "invitationsApi",
        "spacesApi",
        "knockApi",
        "conversationsApi",
        "messagesApi",
        "neighborhoodsApi",
        "platformAdminApi"
      ]
    },
    {
      "id": "data",
      "title": "Repositories and data services",
      "nodes": [
        "repositoryFactory",
        "userRepository",
        "companyRepository",
        "invitationRepository",
        "spaceRepository",
        "conversationRepository",
        "messageRepository",
        "neighborhoodRepository",
        "platformRepository",
        "supabaseClients",
        "supabaseAuth",
        "supabasePostgres",
        "supabaseRealtime",
        "storageServices",
        "browserStorage",
        "tanstackQuery"
      ]
    }
  ],
  "nodes": [
    {
      "id": "authRoutes",
      "label": "Auth routes",
      "kind": "route",
      "path": "src/app/(auth)",
      "details": "Login, signup, forgot password, set password, and create-company pages.",
      "children": ["login/page.tsx", "signup/page.tsx", "forgot-password/page.tsx", "set-password/page.tsx", "create-company/page.tsx"]
    },
    {
      "id": "joinOnboardingRoutes",
      "label": "Join and onboarding routes",
      "kind": "route",
      "path": "src/app/join + src/app/onboarding",
      "details": "Invitation acceptance, pending-invite handling, and first-company routing.",
      "children": ["join/page.tsx", "onboarding/page.tsx", "auth/callback/route.ts"]
    },
    {
      "id": "dashboardRoutes",
      "label": "Dashboard routes",
      "kind": "route",
      "path": "src/app/(dashboard)",
      "details": "Authenticated app shell, dashboard, company, floor plan, office, profile, settings, and realtime test pages.",
      "children": ["dashboard/page.tsx", "company/page.tsx", "floor-plan/page.tsx", "office/page.tsx", "settings/page.tsx", "dashboard/profile/page.tsx"]
    },
    {
      "id": "adminRoutes",
      "label": "Admin and platform routes",
      "kind": "route",
      "path": "src/app/admin + src/app/platform-admin",
      "details": "Company admin invitation management and platform-admin company creation.",
      "children": ["admin/invitations/page.tsx", "platform-admin/page.tsx", "platform-admin/layout.tsx"]
    },
    {
      "id": "authComponents",
      "label": "Auth components",
      "kind": "component",
      "path": "src/components/auth",
      "details": "Embedded auth form and email confirmation UI used by join and signup flows.",
      "children": ["EmbeddedAuthForm.tsx", "EmailConfirmationMessage.tsx"]
    },
    {
      "id": "companyComponents",
      "label": "Company dashboard components",
      "kind": "component",
      "path": "src/components/dashboard",
      "details": "Company settings, members, invitations, pending invite list, and profile panels.",
      "children": ["pending-invitations-list.tsx", "invite-user-dialog.tsx", "company-members.tsx", "company-settings.tsx", "user-profile.tsx"]
    },
    {
      "id": "floorPlanComponents",
      "label": "Floor plan package",
      "kind": "component",
      "path": "src/components/floor-plan",
      "details": "Room creation, room management, templates, audio controls, and the primary FloorPlan wrapper.",
      "children": ["floor-plan.tsx", "room-dialog", "room-management.tsx", "room-templates.tsx", "SpaceAudioControls.tsx", "space-debug-panel.tsx"]
    },
    {
      "id": "modernFloorComponents",
      "label": "Modern floor plan components",
      "kind": "component",
      "path": "src/components/floor-plan/modern",
      "details": "Card-based floor plan, space action controls, presence avatars, knock banners, neighborhoods, and Now Board.",
      "children": ["ModernFloorPlan.tsx", "ModernSpaceCard.tsx", "SpaceActionButtons.tsx", "KnockBanner.tsx", "KnockToast.tsx", "NowBoard.tsx", "NeighborhoodSection.tsx", "AvatarGroup.tsx"]
    },
    {
      "id": "messagingComponents",
      "label": "Messaging components",
      "kind": "component",
      "path": "src/components/messaging",
      "details": "Global messaging drawer, conversation list/search, feed, composer, reactions, typing, and user interaction menu.",
      "children": ["MessagingDrawer.tsx", "ConversationList.tsx", "ConversationSearch.tsx", "message-feed.tsx", "EnhancedMessageComposer.tsx", "ReactionChips.tsx", "EmojiPicker.tsx", "TypingIndicator.tsx"]
    },
    {
      "id": "profileComponents",
      "label": "Profile and avatar components",
      "kind": "component",
      "path": "src/components/profile + src/components/ui",
      "details": "Canonical profile editing, avatar upload, and avatar display surfaces.",
      "children": ["EnhancedUserProfile.tsx", "ProfileForm.tsx", "UploadableAvatar.tsx", "enhanced-avatar-v2.tsx"]
    },
    {
      "id": "uiComponents",
      "label": "UI primitives and shell",
      "kind": "component",
      "path": "src/components/ui + src/components/shell",
      "details": "shadcn/Radix primitives, dashboard shell, header, user menu, search, and navigation components.",
      "children": ["button.tsx", "card.tsx", "dialog.tsx", "dropdown-menu.tsx", "tooltip.tsx", "dashboard-shell.tsx", "dashboard-header.tsx", "global-search.tsx"]
    },
    {
      "id": "authContext",
      "label": "AuthContext and useSession",
      "kind": "context",
      "path": "src/contexts/AuthContext.tsx + src/hooks/useSession.ts",
      "details": "Supabase session state, password login, signup, Google OAuth, sign out, and Google avatar sync.",
      "children": ["signIn", "signUp", "signInWithGoogle", "signOut", "useSession"]
    },
    {
      "id": "companyContext",
      "label": "CompanyContext",
      "kind": "context",
      "path": "src/contexts/CompanyContext.tsx",
      "details": "Loads and mutates the current company, current user profile, company users, and spaces.",
      "children": ["loadCompanyData", "createNewCompany", "updateCompanyDetails", "updateUserProfile", "refreshCompanyData"]
    },
    {
      "id": "presenceContext",
      "label": "PresenceContext",
      "kind": "context",
      "path": "src/contexts/PresenceContext.tsx",
      "details": "Wraps useUserPresence and exposes users, usersInSpaces, currentUserSpaceId, and updateLocation.",
      "children": ["users", "usersInSpaces", "updateLocation", "currentUserSpaceId"]
    },
    {

  "flows": [
    {
      "id": "invite-new-user",
      "title": "Invite new user",
      "summary": "Admin creates or reuses a pending invitation, sends a Supabase invite email, and receives a copyable /join URL.",
      "trigger": "Admin opens /admin/invitations and submits email, role, and current company.",
      "primaryPayload": {
        "request": "{ email, role: 'admin' | 'member', companyId }",
        "token": "crypto.randomBytes(32).toString('hex')",
        "response": "{ success, invitation: { id, email, token, expiresAt, inviteUrl, emailSent }, limit, remaining }"
      },
      "steps": [
        {
          "node": "adminRoutes",
          "title": "Admin route renders invitation UI",
          "text": "src/app/admin/invitations/page.tsx renders PendingInvitationsList for company admins."
        },
        {
          "node": "companyComponents",
          "title": "PendingInvitationsList reads company context",
          "text": "The component gets company.id from CompanyContext, loads current invitations, and posts create/resend/revoke mutations."
        },
        {
          "node": "invitationsApi",
          "title": "Create endpoint validates the request",
          "text": "POST /api/invitations/create validates email, role, companyId, current user auth, company admin rights, stale invitations, capacity, and duplicate pending invites."
        },
        {
          "node": "invitationRepository",
          "title": "Invitation repository persists the token",
          "text": "SupabaseInvitationRepository.create stores email, companyId, role, token, expiresAt, and pending status."
        },
        {
          "node": "supabaseAuth",
          "title": "Supabase Auth sends the invite email",
          "text": "auth.admin.inviteUserByEmail receives redirectTo=/join?token=<token> plus metadata with invitation_token, company_id, and role."
        },
        {
          "node": "tanstackQuery",
          "title": "Client cache refreshes invitation list",
          "text": "The mutation response returns inviteUrl and capacity metadata; PendingInvitationsList invalidates the invitations query and exposes copy/resend/revoke actions."
        }
      ],
      "edges": [
        { "from": "adminRoutes", "to": "companyComponents", "step": "1", "label": "renders", "passes": "PendingInvitationsList" },
        { "from": "companyComponents", "to": "companyContext", "step": "2", "label": "reads", "passes": "company.id, currentUserProfile.role" },
        { "from": "companyComponents", "to": "invitationsApi", "step": "3", "label": "POST create", "passes": "{ email, role, companyId }" },
        { "from": "invitationsApi", "to": "supabaseClients", "step": "3", "label": "server clients", "passes": "regular client for RLS checks, service_role for auth email" },
        { "from": "invitationsApi", "to": "supabasePostgres", "step": "3", "label": "validates", "passes": "companies.admin_ids, users.supabase_uid, invitations count" },
        { "from": "invitationsApi", "to": "invitationRepository", "step": "4", "label": "create", "passes": "{ email, companyId, role, token, expiresAt }" },
        { "from": "invitationRepository", "to": "supabasePostgres", "step": "4", "label": "insert", "passes": "invitations row: pending" },
        { "from": "invitationsApi", "to": "supabaseAuth", "step": "5", "label": "invite email", "passes": "redirectTo=/join?token=<token>, invite metadata" },
        { "from": "invitationsApi", "to": "companyComponents", "step": "6", "label": "returns", "passes": "inviteUrl, emailSent, remaining capacity" },
        { "from": "companyComponents", "to": "tanstackQuery", "step": "6", "label": "invalidate", "passes": "queryKey ['invitations', company.id]" }
      ],
      "notes": [
        "Existing pending invitations for the same email/company are reused to avoid email spam.",
        "The free tier limit is calculated as current users plus active pending invitations."
      ]
    },
    {
      "id": "accept-invitation",
      "title": "Accept invitation",
      "summary": "Invitee follows /join?token=..., authenticates if needed, then the server attaches their app user to the invited company and marks the invitation accepted.",
      "trigger": "Invitee clicks the Supabase invite email or opens a copied /join link.",
      "primaryPayload": {
        "validate": "GET /api/invitations/validate?token=<token>",
        "accept": "POST /api/invitations/accept { token, displayName? }",
        "state": "join page state: loading | show-auth | accepting | success | invalid-token | already-company"
      },
      "steps": [
        {
          "node": "joinOnboardingRoutes",
          "title": "Join page processes token and auth hash",
          "text": "src/app/join/page.tsx reads token, processes Supabase hash/code with the browser client, and redirects invite/recovery hashes to /set-password when needed."
        },
        {
          "node": "invitationsApi",
          "title": "Token validation is public but server-side",
          "text": "GET /api/invitations/validate uses service_role to load invitations and company name, rejecting missing, expired, accepted, or invalid tokens."
        },
        {
          "node": "authComponents",
          "title": "Auth UI is shown when no session exists",
          "text": "EmbeddedAuthForm signs in, signs up, or starts Google OAuth using AuthContext, then returns to the same invite path."
        },
        {
          "node": "usersApi",
          "title": "Existing company guard runs before accept",
          "text": "/join calls /api/users/get-by-id?supabase_uid=... to avoid attaching users who already belong to another company."
        },
        {
          "node": "invitationsApi",
          "title": "Accept endpoint authorizes the session",
          "text": "POST /api/invitations/accept uses getUser(), verifies invitation email matches authUser.email, and uses service_role repos because the invitee may not yet belong to the company."
        },
        {
          "node": "userRepository",
          "title": "User profile is updated",
          "text": "SupabaseUserRepository.findBySupabaseUid locates the app user, then update sets companyId and role from the invitation."
        },
        {
          "node": "invitationRepository",
          "title": "Invitation is consumed",
          "text": "SupabaseInvitationRepository.updateStatus marks the token accepted; the client hard-redirects to /dashboard so CompanyContext reloads cleanly."
        }
      ],
      "edges": [
        { "from": "joinOnboardingRoutes", "to": "supabaseClients", "step": "1", "label": "process hash", "passes": "access_token, refresh_token, code, type" },
        { "from": "joinOnboardingRoutes", "to": "invitationsApi", "step": "2", "label": "GET validate", "passes": "token" },
        { "from": "invitationsApi", "to": "supabasePostgres", "step": "2", "label": "loads", "passes": "invitations + companies.name" },
        { "from": "joinOnboardingRoutes", "to": "authComponents", "step": "3", "label": "shows auth", "passes": "inviteEmail, oauthNextPath" },
        { "from": "authComponents", "to": "authContext", "step": "3", "label": "auth action", "passes": "email/password or Google OAuth next path" },
        { "from": "authContext", "to": "supabaseAuth", "step": "3", "label": "session", "passes": "signIn, signUp, signInWithOAuth" },
        { "from": "joinOnboardingRoutes", "to": "usersApi", "step": "4", "label": "guard", "passes": "supabase_uid" },
        { "from": "joinOnboardingRoutes", "to": "invitationsApi", "step": "5", "label": "POST accept", "passes": "{ token }" },
        { "from": "invitationsApi", "to": "invitationRepository", "step": "5", "label": "find token", "passes": "pending invitation" },
        { "from": "invitationsApi", "to": "userRepository", "step": "6", "label": "attach user", "passes": "{ companyId, role, displayName? }" },
        { "from": "userRepository", "to": "supabasePostgres", "step": "6", "label": "update", "passes": "users.company_id, users.role" },
        { "from": "invitationRepository", "to": "supabasePostgres", "step": "7", "label": "consume", "passes": "invitations.status='accepted'" },
        { "from": "joinOnboardingRoutes", "to": "dashboardRoutes", "step": "7", "label": "redirect", "passes": "window.location.href='/dashboard'" },
        { "from": "dashboardRoutes", "to": "companyContext", "step": "7", "label": "reload", "passes": "company, users, spaces" }
      ],
      "notes": [
        "Email mismatch returns 403 and leaves the invite pending.",
        "Different-company conflicts return 409 and show the already-company state."
      ]
    },

        { "from": "spaceRepository", "to": "supabasePostgres", "step": "4", "label": "write", "passes": "spaces row" },
        { "from": "queryHooks", "to": "tanstackQuery", "step": "5", "label": "invalidate", "passes": "queryKey ['spaces']" },
        { "from": "supabasePostgres", "to": "supabaseRealtime", "step": "5", "label": "space change", "passes": "INSERT/UPDATE/DELETE" },
        { "from": "supabaseRealtime", "to": "queryHooks", "step": "5", "label": "invalidate", "passes": "['spaces', companyId]" },
        { "from": "queryHooks", "to": "companyContext", "step": "5", "label": "refresh surface", "passes": "spaces array" }
      ],
      "notes": [
        "Room templates become normal space create payloads with template defaults for capacity, features, position, and access control.",
        "Space status changes can create room system messages through SystemMessageService."
      ]
    }
  ]
}
  </script>

  <script>
    const data = JSON.parse(document.getElementById('workflow-data').textContent);
    const nodesById = new Map(data.nodes.map((node) => [node.id, node]));
    const flowsById = new Map(data.flows.map((flow) => [flow.id, flow]));
    const state = {
      activeFlowId: data.flows[0].id,
      selectedNodeId: null,
      activeTab: 'steps'
    };

    const flowListEl = document.getElementById('flow-list');
    const nodesGridEl = document.getElementById('nodes-grid');
    const edgeLayerEl = document.getElementById('edge-layer');
    const edgeLabelLayerEl = document.getElementById('edge-label-layer');
    const surfaceEl = document.getElementById('diagram-surface');
    const wrapEl = document.getElementById('diagram-wrap');
    const detailTitleEl = document.getElementById('detail-title');
    const detailSummaryEl = document.getElementById('detail-summary');
    const detailBodyEl = document.getElementById('detail-body');
    const jsonPanelEl = document.getElementById('json-panel');
    const jsonToggleButton = document.getElementById('json-toggle-button');
    const fitActiveButton = document.getElementById('fit-active-button');

    function getKindClass(kind) {
      return `kind kind-${kind}`;
    }

    function unique(values) {
      return Array.from(new Set(values.filter(Boolean)));
    }

    function activeFlow() {
      return flowsById.get(state.activeFlowId);
    }

    function activeNodeIds(flow) {
      return unique([
        ...flow.steps.map((step) => step.node),
        ...flow.edges.flatMap((edge) => [edge.from, edge.to])
      ]);
    }

    function nodeStepMap(flow) {
      const map = new Map();
      flow.steps.forEach((step, index) => {
        if (!map.has(step.node)) {
          map.set(step.node, String(index + 1));
        }
      });
      return map;
    }

    function renderFlowList() {
      flowListEl.innerHTML = '';
      data.flows.forEach((flow) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = `flow-button${flow.id === state.activeFlowId ? ' active' : ''}`;
        button.dataset.flowId = flow.id;
        button.innerHTML = `
          <strong>${escapeHtml(flow.title)}</strong>
          <span>${escapeHtml(flow.summary)}</span>
          <span class="flow-meta">
            <span class="pill">${flow.steps.length} steps</span>
            <span class="pill">${flow.edges.length} handoffs</span>
          </span>
        `;
        button.addEventListener('click', () => {
          state.activeFlowId = flow.id;
          state.activeTab = 'steps';
          render();
          focusFirstActiveNode();
        });
        flowListEl.appendChild(button);
      });
    }

    function renderNodes() {
      const flow = activeFlow();
      const activeIds = new Set(activeNodeIds(flow));
      const stepMap = nodeStepMap(flow);
      nodesGridEl.innerHTML = '';

      data.lanes.forEach((lane) => {
        const laneEl = document.createElement('section');
        laneEl.className = 'lane';
        laneEl.innerHTML = `<h2>${escapeHtml(lane.title)}</h2>`;

        lane.nodes.forEach((nodeId) => {
          const node = nodesById.get(nodeId);
          if (!node) return;

          const nodeEl = document.createElement('article');
          const isActive = activeIds.has(node.id);
          const isSelected = state.selectedNodeId === node.id;
          nodeEl.className = [
            'node',
            isActive ? 'active' : 'dimmed',
            isSelected ? 'selected' : ''
          ].filter(Boolean).join(' ');
          nodeEl.dataset.nodeId = node.id;
          const children = (node.children || []).slice(0, 8);
          const extraCount = (node.children || []).length - children.length;
          nodeEl.innerHTML = `
            <span class="${getKindClass(node.kind)}">${escapeHtml(node.kind)}</span>
            <span class="step-badge">${escapeHtml(stepMap.get(node.id) || '')}</span>
            <span class="node-title">${escapeHtml(node.label)}</span>
            <div class="node-path">${escapeHtml(node.path)}</div>
            <div class="chips">
              ${children.map((child) => `<span class="chip">${escapeHtml(child)}</span>`).join('')}
              ${extraCount > 0 ? `<span class="chip">+${extraCount} more</span>` : ''}
            </div>
          `;
          nodeEl.addEventListener('click', () => {
            state.selectedNodeId = node.id;
            state.activeTab = 'package';
            render();
          });
          laneEl.appendChild(nodeEl);
        });

        nodesGridEl.appendChild(laneEl);
      });
    }

    function drawEdges() {
      const flow = activeFlow();
      edgeLayerEl.innerHTML = `
        <defs>
          <marker id="arrow-active" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f766e"></path>
          </marker>
        </defs>
      `;
      edgeLabelLayerEl.innerHTML = '';

      const surfaceRect = surfaceEl.getBoundingClientRect();
      const width = Math.max(surfaceEl.scrollWidth, surfaceEl.offsetWidth);
      const height = Math.max(surfaceEl.scrollHeight, surfaceEl.offsetHeight);
      edgeLayerEl.setAttribute('width', width);
      edgeLayerEl.setAttribute('height', height);
      edgeLayerEl.setAttribute('viewBox', `0 0 ${width} ${height}`);

      flow.edges.forEach((edge, index) => {
        const fromEl = nodesGridEl.querySelector(`[data-node-id="${CSS.escape(edge.from)}"]`);
        const toEl = nodesGridEl.querySelector(`[data-node-id="${CSS.escape(edge.to)}"]`);
        if (!fromEl || !toEl) return;

        const fromRect = fromEl.getBoundingClientRect();
        const toRect = toEl.getBoundingClientRect();
        const fromCenterX = fromRect.left - surfaceRect.left + fromRect.width / 2;
        const fromCenterY = fromRect.top - surfaceRect.top + fromRect.height / 2;
        const toCenterX = toRect.left - surfaceRect.left + toRect.width / 2;
        const toCenterY = toRect.top - surfaceRect.top + toRect.height / 2;

        const isForward = fromCenterX <= toCenterX;
        const x1 = fromRect.left - surfaceRect.left + (isForward ? fromRect.width : 0);
        const y1 = fromCenterY;
        const x2 = toRect.left - surfaceRect.left + (isForward ? 0 : toRect.width);
        const y2 = toCenterY;
        const dx = Math.max(60, Math.abs(x2 - x1) * 0.45);
        const c1x = x1 + (isForward ? dx : -dx);
        const c2x = x2 - (isForward ? dx : -dx);
        const path = `M ${x1} ${y1} C ${c1x} ${y1}, ${c2x} ${y2}, ${x2} ${y2}`;

        const pathEl = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        pathEl.setAttribute('d', path);
        pathEl.setAttribute('class', 'flow-edge active');
        pathEl.setAttribute('marker-end', 'url(#arrow-active)');
        pathEl.style.opacity = String(Math.max(0.36, 1 - index * 0.015));
        edgeLayerEl.appendChild(pathEl);

        const label = document.createElement('div');
        label.className = 'edge-label';
        const labelX = (x1 + x2) / 2;
        const labelY = (y1 + y2) / 2;
        label.style.left = `${labelX}px`;
        label.style.top = `${labelY}px`;
        label.innerHTML = `<strong>${escapeHtml(edge.step)}. ${escapeHtml(edge.label)}</strong>${escapeHtml(edge.passes)}`;
        edgeLabelLayerEl.appendChild(label);
      });
    }

    function renderDetail() {
      const flow = activeFlow();
      detailTitleEl.textContent = flow.title;
      detailSummaryEl.textContent = flow.summary;

      document.querySelectorAll('.tab').forEach((tab) => {
        tab.classList.toggle('active', tab.dataset.tab === state.activeTab);
      });

      if (state.activeTab === 'steps') {
        detailBodyEl.innerHTML = `
          <div class="detail-section">
            <h3>Trigger</h3>
            <div class="code">${escapeHtml(flow.trigger)}</div>
          </div>
          <div class="detail-section">
            <h3>Step Annotations</h3>
            <div class="step-list">
              ${flow.steps.map((step, index) => {
                const node = nodesById.get(step.node);
                return `
                  <div class="step">
                    <div class="step-number">${index + 1}</div>
                    <div class="step-content">
                      <strong>${escapeHtml(step.title)}</strong>
                      <p>${escapeHtml(step.text)}</p>
                      <div class="node-path">${escapeHtml(node ? node.label : step.node)}</div>
                    </div>
                  </div>
                `;
              }).join('')}
            </div>
          </div>
          ${renderNotes(flow)}
        `;
        return;
      }

      if (state.activeTab === 'payloads') {
        detailBodyEl.innerHTML = `
          <div class="detail-section">
            <h3>Primary Payload</h3>
            <div class="code">${escapeHtml(JSON.stringify(flow.primaryPayload, null, 2))}</div>
          </div>
          <div class="detail-section">
            <h3>Handoffs</h3>
            <div class="step-list">
              ${flow.edges.map((edge, index) => {
                const from = nodesById.get(edge.from);
                const to = nodesById.get(edge.to);
                return `
                  <div class="step">
                    <div class="step-number">${index + 1}</div>
                    <div class="step-content">
                      <strong>${escapeHtml(from?.label || edge.from)} -> ${escapeHtml(to?.label || edge.to)}</strong>
                      <p>${escapeHtml(edge.label)}: ${escapeHtml(edge.passes)}</p>
                    </div>
                  </div>
                `;
              }).join('')}
            </div>
          </div>
        `;
        return;
      }

      const selectedNode = state.selectedNodeId
        ? nodesById.get(state.selectedNodeId)
        : nodesById.get(activeNodeIds(flow)[0]);
      detailBodyEl.innerHTML = renderNodeDetail(selectedNode, flow);
    }

    function renderNodeDetail(node, flow) {
      if (!node) {
        return '<div class="node-detail">Select a package to inspect it.</div>';
      }

      const touchedBy = data.flows
        .filter((candidate) => activeNodeIds(candidate).includes(node.id))
        .map((candidate) => candidate.title);

      const flowEdges = flow.edges.filter((edge) => edge.from === node.id || edge.to === node.id);

      return `
        <div class="detail-section">
          <h3>Selected Package</h3>
          <dl class="node-detail">
            <dt>Name</dt>
            <dd>${escapeHtml(node.label)}</dd>
            <dt>Kind</dt>
            <dd>${escapeHtml(node.kind)}</dd>
            <dt>Path</dt>
            <dd class="node-path">${escapeHtml(node.path)}</dd>
            <dt>Role</dt>
            <dd>${escapeHtml(node.details)}</dd>
            <dt>Visible contents</dt>
            <dd>${escapeHtml((node.children || []).join(', '))}</dd>
            <dt>Used by flows</dt>
            <dd>${escapeHtml(touchedBy.join(', ') || 'Not highlighted by current documented flows')}</dd>
          </dl>
        </div>
        <div class="detail-section">
          <h3>Current Flow Handoffs</h3>
          ${flowEdges.length ? `
            <div class="step-list">
              ${flowEdges.map((edge, index) => {
                const from = nodesById.get(edge.from);
                const to = nodesById.get(edge.to);
                return `
                  <div class="step">
                    <div class="step-number">${index + 1}</div>
                    <div class="step-content">
                      <strong>${escapeHtml(from?.label || edge.from)} -> ${escapeHtml(to?.label || edge.to)}</strong>
                      <p>${escapeHtml(edge.label)}: ${escapeHtml(edge.passes)}</p>
                    </div>
                  </div>
                `;
              }).join('')}
            </div>
          ` : '<p class="subtitle">This package is visible in the architecture map but is not part of the selected flow.</p>'}
        </div>
      `;
    }

    function renderNotes(flow) {
      if (!flow.notes || flow.notes.length === 0) return '';
      return `
        <div class="detail-section">
          <h3>Notes</h3>
          <div class="step-list">
            ${flow.notes.map((note, index) => `
              <div class="step">
                <div class="step-number">${index + 1}</div>
                <div class="step-content"><p>${escapeHtml(note)}</p></div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    function focusFirstActiveNode() {
      const flow = activeFlow();
      const first = activeNodeIds(flow)[0];
      const firstEl = first ? nodesGridEl.querySelector(`[data-node-id="${CSS.escape(first)}"]`) : null;
      if (firstEl) {
        firstEl.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
      }
    }

    function renderJsonPanel() {
      jsonPanelEl.textContent = JSON.stringify(data, null, 2);
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function render() {
      renderFlowList();
      renderNodes();
      renderDetail();
      requestAnimationFrame(drawEdges);
    }

    document.querySelectorAll('.tab').forEach((tab) => {
      tab.addEventListener('click', () => {
        state.activeTab = tab.dataset.tab;
        render();
      });
    });

    jsonToggleButton.addEventListener('click', () => {
      const isVisible = jsonPanelEl.classList.toggle('visible');
      jsonToggleButton.setAttribute('aria-pressed', String(isVisible));
      jsonToggleButton.textContent = isVisible ? 'Hide JSON' : 'Show JSON';
    });

    fitActiveButton.addEventListener('click', () => {
      focusFirstActiveNode();
    });

    wrapEl.addEventListener('scroll', () => requestAnimationFrame(drawEdges));
    window.addEventListener('resize', () => requestAnimationFrame(drawEdges));

    renderJsonPanel();
    render();
  </script>
</body>
</html>
