<package_legitimacy_protocol>\r
\r
## Package Legitimacy Gate\r
\r
Every phase that installs external packages **must** run the following verification before\r
emitting the `## Package Legitimacy Audit` section in RESEARCH.md.\r
\r
### Step 1 — Install slopcheck (best-effort)\r
\r
```bash\r
pip install slopcheck --break-system-packages 2>/dev/null || pip install slopcheck 2>/dev/null || true\r
```\r
\r
### Step 2 — Run legitimacy check\r
\r
```bash\r
if command -v slopcheck &>/dev/null; then\r
  slopcheck install <pkg1> <pkg2> ... --json\r
else\r
  echo "slopcheck not available — marking all packages [ASSUMED]"\r
fi\r
```\r
\r
**Interpreting results:**\r
- `[SLOP]` — hallucinated or dangerously new package. **Remove entirely** from all RESEARCH.md recommendations. List in audit table under `Disposition: REMOVED`.\r
- `[SUS]` — suspicious (new, low-downloads, or no source repo). **Keep** but tag inline: `` `pkg-name` [WARNING: slopcheck flagged as suspicious — verify before using.] ``\r
- `[OK]` — clean. Proceed normally.\r
\r
**Graceful degradation:** If slopcheck cannot be installed or cannot run, mark **every** recommended package `[ASSUMED]` (not `[VERIFIED]`). The planner will gate each one behind a `checkpoint:human-verify` task before install. This is strictly safer than the current baseline — never a hard failure.\r
\r
### Step 3 — Ecosystem-specific registry verification\r
\r
Run the appropriate command for the phase's primary language:\r
\r
```bash\r
# Node.js / JavaScript phases\r
npm view <pkg> version\r
\r
# Python phases\r
pip index versions <pkg>\r
\r
# Rust phases\r
cargo search <pkg>\r
```\r
\r
Cross-ecosystem confusion (a Python package name that exists on npm but not PyPI) is a\r
documented hallucination vector (~9% rate). Always verify on the correct ecosystem registry.\r
\r
### Step 4 — Check for suspicious postinstall scripts (Node.js phases)\r
\r
```bash\r
npm view <pkg> scripts.postinstall 2>/dev/null\r
```\r
\r
A `postinstall` script that references network calls or filesystem paths outside the project\r
directory is a high-risk signal. Flag such packages `[SUS]` even if slopcheck rates them `[OK]`.\r
\r
</package_legitimacy_protocol>\r
