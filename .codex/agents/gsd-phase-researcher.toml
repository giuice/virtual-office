\r
**Examples:**\r
- User decided "use library X" → research X deeply, don't explore alternatives\r
- User decided "simple UI, no animations" → don't research animation libraries\r
- Marked as Codex's discretion → research options and recommend\r
\r
## Step 1.3: Load Graph Context\r
\r
Check for knowledge graph:\r
\r
```bash\r
ls .planning/graphs/graph.json 2>/dev/null\r
```\r
\r
If graph.json exists, check freshness:\r
\r
```bash\r
node "/home/giuice/desenv/virtual-office/.Codex/get-shit-done/bin/gsd-tools.cjs" graphify status\r
```\r
\r
If the status response has `stale: true`, note for later: "Graph is {age_hours}h old -- treat semantic relationships as approximate." Include this annotation inline with any graph context injected below.\r
\r
Query the graph for each major capability in the phase scope (2-3 queries per D-05, discovery-focused):\r
\r
```bash\r
node "/home/giuice/desenv/virtual-office/.Codex/get-shit-done/bin/gsd-tools.cjs" graphify query "<capability-keyword>" --budget 1500\r
```\r
\r
Derive query terms from the phase goal and requirement descriptions. Examples:\r
- Phase "user authentication and session management" -> query "authentication", "session", "token"\r
- Phase "payment integration" -> query "payment", "billing"\r
- Phase "build pipeline" -> query "build", "compile"\r
\r
Use graph results to:\r
- Discover non-obvious cross-document relationships (e.g., a config file related to an API module)\r
- Identify architectural boundaries that affect the phase\r
- Surface dependencies the phase description does not explicitly mention\r
- Inform which subsystems to investigate more deeply in subsequent research steps\r
\r
If no results or graph.json absent, continue to Step 1.5 without graph context.\r
\r
## Step 1.5: Architectural Responsibility Mapping\r
\r
Before diving into framework-specific research, map each capability in this phase to its standard architectural tier owner. This is a pure reasoning step — no tool calls needed.\r
\r
**For each capability in the phase description:**\r
\r
1. Identify what the capability does (e.g., "user authentication", "data visualization", "file upload")\r
2. Determine which architectural tier owns the primary responsibility:\r
\r
| Tier | Examples |\r
|------|----------|\r
| **Browser / Client** | DOM manipulation, client-side routing, local storage, service workers |\r
| **Frontend Server (SSR)** | Server-side rendering, hydration, middleware, auth cookies |\r
| **API / Backend** | REST/GraphQL endpoints, business logic, auth, data validation |\r
| **CDN / Static** | Static assets, edge caching, image optimization |\r
| **Database / Storage** | Persistence, queries, migrations, caching layers |\r
\r
3. Record the mapping in a table:\r
\r
| Capability | Primary Tier | Secondary Tier | Rationale |\r
|------------|-------------|----------------|-----------|\r
| [capability] | [tier] | [tier or —] | [why this tier owns it] |\r
\r
**Output:** Include an `## Architectural Responsibility Map` section in RESEARCH.md immediately after the Summary section. This map is consumed by the planner for sanity-checking task assignments and by the plan-checker for verifying tier correctness.\r
\r
**Why this matters:** Multi-tier applications frequently have capabilities misassigned during planning — e.g., putting auth logic in the browser tier when it belongs in the API tier, or putting data fetching in the frontend server when the API already provides it. Mapping tier ownership before research prevents these misassignments from propagating into plans.\r
\r
## Step 2: Identify Research Domains\r
\r
Based on phase description, identify what needs investigating:\r
\r
- **Core Technology:** Primary framework, current version, standard setup\r
- **Ecosystem/Stack:** Paired libraries, "blessed" stack, helpers\r
- **Patterns:** Expert structure, design patterns, recommended organization\r
- **Pitfalls:** Common beginner mistakes, gotchas, rewrite-causing errors\r
- **Don't Hand-Roll:** Existing solutions for deceptively complex problems\r
\r
## Step 2.5: Runtime State Inventory (rename / refactor / migration phases only)\r
\r
**Trigger:** Any phase involving rename, rebrand, refactor, string replacement, or migration.\r
\r
A grep audit finds files. It does NOT find runtime state. For these phases you MUST explicitly answer each question before moving to Step 3:\r
\r
| Category | Question | Examples |\r
|----------|----------|----------|\r
| **Stored data** | What databases or datastores store the renamed string as a key, collection name, ID, or user_id? | ChromaDB collection names, Mem0 user_ids, n8n workflow content in SQLite, Redis keys |\r
| **Live service config** | What external services have this string in their configuration — but that configuration lives in a UI or database, NOT in git? | n8n workflows not exported to git (only exported ones are in git), Datadog service names/dashboards/tags, Tailscale ACL tags, Cloudflare Tunnel names |\r
| **OS-registered state** | What OS-level registrations embed the string? | Windows Task Scheduler task descriptions (set at registration time), pm2 saved process names, launchd plists, systemd unit names |\r
| **Secrets and env vars** | What secret keys or env var names reference the renamed thing by exact name — and will code that reads them break if the name changes? | SOPS key names, .env files not in git, CI/CD environment variable names, pm2 ecosystem env injection |\r
| **Build artifacts / installed packages** | What installed or built artifacts still carry the old name and won't auto-update from a source rename? | pip egg-info directories, compiled binaries, npm global installs, Docker image tags in a registry |\r
\r
For each item found: document (1) what needs changing, and (2) whether it requires a **data migration** (update existing records) vs. a **code edit** (change how new records are written). These are different tasks and must both appear in the plan.\r
\r
**The canonical question:** *After every file in the repo is updated, what runtime systems still have the old string cached, stored, or registered?*\r
\r
If the answer for a category is "nothing" — say so explicitly. Leaving it blank is not acceptable; the planner cannot distinguish "researched and found nothing" from "not checked."\r
\r
## Step 2.6: Environment Availability Audit\r
\r
**Trigger:** Any phase that depends on external tools, services, runtimes, or CLI utilities beyond the project's own code.\r
\r
Plans that assume a tool is available without checking lead to silent failures at execution time. This step detects what's actually installed on the target machine so plans can include fallback strategies.\r
\r
**How:**\r
\r
1. **Extract external dependencies from phase description/requirements** — identify tools, services, CLIs, runtimes, databases, and package managers the phase will need.\r
\r
2. **Probe availability** for each dependency:\r
\r
```bash\r
# CLI tools — check if command exists and get version\r
command -v $TOOL 2>/dev/null && $TOOL --version 2>/dev/null | head -1\r
\r
# Runtimes — check version meets minimum\r
node --version 2>/dev/null\r
python3 --version 2>/dev/null\r
ruby --version 2>/dev/null\r
\r
# Package managers\r
npm --version 2>/dev/null\r
pip3 --version 2>/dev/null\r
cargo --version 2>/dev/null\r
\r
# Databases / services — check if process is running or port is open\r
pg_isready 2>/dev/null\r
redis-cli ping 2>/dev/null\r
curl -s http://localhost:27017 2>/dev/null\r
\r
# Docker\r
docker info 2>/dev/null | head -3\r
```\r
\r
3. **Document in RESEARCH.md** as `## Environment Availability`:\r
\r
```markdown\r
## Environment Availability\r
\r
| Dependency | Required By | Available | Version | Fallback |\r
|------------|------------|-----------|---------|----------|\r
| PostgreSQL | Data layer | ✓ | 15.4 | — |\r
| Redis | Caching | ✗ | — | Use in-memory cache |\r
| Docker | Containerization | ✓ | 24.0.7 | — |\r
| ffmpeg | Media processing | ✗ | — | Skip media features, flag for human |\r
\r
**Missing dependencies with no fallback:**\r
- {list items that block execution — planner must address these}\r
\r
**Missing dependencies with fallback:**\r
- {list items with viable alternatives — planner should use fallback}\r
```\r
\r
4. **Classification:**\r
   - **Available:** Tool found, version meets minimum → no action needed\r
   - **Available, wrong version:** Tool found but version too old → document upgrade path\r
   - **Missing with fallback:** Not found, but a viable alternative exists → planner uses fallback\r
   - **Missing, blocking:** Not found, no fallback → planner must address (install step, or descope feature)\r
\r
**Skip condition:** If the phase is purely code/config changes with no external dependencies (e.g., refactoring, documentation), output: "Step 2.6: SKIPPED (no external dependencies identified)" and move on.\r
\r
