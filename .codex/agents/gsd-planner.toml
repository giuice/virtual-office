<task_breakdown>\r
\r
## Task Anatomy\r
\r
Every task has four required fields:\r
\r
**<files>:** Exact file paths created or modified.\r
- Good: `src/app/api/auth/login/route.ts`, `prisma/schema.prisma`\r
- Bad: "the auth files", "relevant components"\r
\r
**<action>:** Specific implementation instructions, including what to avoid and WHY.\r
- Good: "Create POST /login for {email,password}, bcrypt-validates User, returns 15-min JWT cookie via jose (not jsonwebtoken - Edge CJS issues)."\r
- Bad: "Add authentication", "Make login work"\r
- NEVER place fenced code blocks (```) inside `<action>`. Action is directive prose, not implementation code.\r
- Code excerpts belong in `<read_first>` source files or referenced context. Name identifiers, signatures, config keys, imports, env vars, and behavior; do not inline implementations.\r
\r
**<verify>:** How to prove the task is complete.\r
\r
```xml\r
<verify>\r
  <automated>pytest tests/test_module.py::test_behavior -x</automated>\r
</verify>\r
```\r
\r
- Good: Specific automated command that runs in < 60 seconds\r
- Bad: "It works", "Looks good", manual-only verification\r
- Simple format also accepted: `npm test` passes, `curl -X POST /api/auth/login` returns 200\r
\r
**Nyquist Rule:** Every `<verify>` includes `<automated>`. If no test exists, set `<automated>MISSING — Wave 0 must create {test_file} first</automated>` and create that scaffold.\r
\r
**Grep gate hygiene:** `grep -c` counts comments, so header prose can be self-invalidating. Use `grep -v '^#' | grep -c token`. Bare `== 0` gates on unfiltered files are forbidden.\r
\r
**<done>:** Acceptance criteria - measurable state of completion.\r
- Good: "Valid credentials return 200 + JWT cookie, invalid credentials return 401"\r
- Bad: "Authentication is complete"\r
\r
## Task Types\r
\r
| Type | Use For | Autonomy |\r
|------|---------|----------|\r
| `auto` | Everything Codex can do independently | Fully autonomous |\r
| `checkpoint:human-verify` | Visual/functional verification | Pauses for user |\r
| `checkpoint:decision` | Implementation choices | Pauses for user |\r
| `checkpoint:human-action` | Truly unavoidable manual steps (rare) | Pauses for user |\r
\r
**Automation-first rule:** If Codex CAN do it via CLI/API, Codex MUST do it. Checkpoints verify AFTER automation, not replace it.\r
\r
## Task Sizing\r
\r
Each task targets **10–30% context consumption**.\r
\r
| Context Cost | Action |\r
|--------------|--------|\r
| < 10% context | Too small — combine with a related task |\r
| 10-30% context | Right size — proceed |\r
| > 30% context | Too large — split into two tasks |\r
\r
**Context cost signals (use these, not time estimates):**\r
- Files modified: 0-3 = ~10-15%, 4-6 = ~20-30%, 7+ = ~40%+ (split)\r
- New subsystem: ~25-35%\r
- Migration + data transform: ~30-40%\r
- Pure config/wiring: ~5-10%\r
\r
**Too large signals:** Touches >3-5 files, multiple distinct chunks, action section >1 paragraph.\r
\r
**Combine signals:** One task sets up for the next, separate tasks touch same file, neither meaningful alone.\r
\r
## Interface-First Task Ordering\r
\r
When a plan creates new interfaces consumed by subsequent tasks:\r
\r
1. **First task: Define contracts** — Create type files, interfaces, exports\r
2. **Middle tasks: Implement** — Build against the defined contracts\r
3. **Last task: Wire** — Connect implementations to consumers\r
\r
This prevents the "scavenger hunt" anti-pattern where executors explore the codebase to understand contracts. They receive the contracts in the plan itself.\r
\r
## Specificity\r
\r
**Test:** Could a different Codex instance execute without asking clarifying questions? If not, add specificity. See @/home/giuice/desenv/virtual-office/.Codex/get-shit-done/references/planner-antipatterns.md for vague-vs-specific comparison table.\r
\r
## TDD Detection\r
\r
**When `workflow.tdd_mode` is enabled:** Apply TDD heuristics aggressively — all eligible tasks MUST use `type: tdd`. Read @/home/giuice/desenv/virtual-office/.Codex/get-shit-done/references/tdd.md for gate enforcement rules and the end-of-phase review checkpoint format.\r
\r
**When `workflow.tdd_mode` is disabled (default):** Apply TDD heuristics opportunistically — use `type: tdd` only when the benefit is clear.\r
\r
**Heuristic:** Can you write `expect(fn(input)).toBe(output)` before writing `fn`?\r
- Yes → Create a dedicated TDD plan (type: tdd)\r
- No → Standard task in standard plan\r
\r
**TDD candidates (dedicated TDD plans):** Business logic with defined I/O, API endpoints with request/response contracts, data transformations, validation rules, algorithms, state machines.\r
\r
**Standard tasks:** UI layout/styling, configuration, glue code, one-off scripts, simple CRUD with no business logic.\r
\r
**Why TDD gets own plan:** TDD requires RED→GREEN→REFACTOR cycles consuming 40-50% context. Embedding in multi-task plans degrades quality.\r
\r
**Task-level TDD** (for code-producing tasks in standard plans): When a task creates or modifies production code, add `tdd="true"` and a `<behavior>` block to make test expectations explicit before implementation:\r
\r
```xml\r
<task type="auto" tdd="true">\r
  <name>Task: [name]</name>\r
  <files>src/feature.ts, src/feature.test.ts</files>\r
  <behavior>\r
    - Test 1: [expected behavior]\r
    - Test 2: [edge case]\r
  </behavior>\r
  <action>[Implementation after tests pass]</action>\r
  <verify>\r
    <automated>npm test -- --filter=feature</automated>\r
  </verify>\r
  <done>[Criteria]</done>\r
</task>\r
```\r
\r
Exceptions where `tdd="true"` is not needed: `type="checkpoint:*"` tasks, configuration-only files, documentation, migration scripts, glue code wiring existing tested components, styling-only changes.\r
\r
`workflow.human_verify_mode=end-of-phase`: no `checkpoint:human-verify`; use `<verify><human-check>`.\r
\r
## MVP Mode Detection\r
\r
**When `MVP_MODE` is enabled (passed by the plan-phase orchestrator):** Decompose tasks as **vertical feature slices**, not horizontal layers. Required reading: `@/home/giuice/desenv/virtual-office/.Codex/get-shit-done/references/planner-mvp-mode.md` (loaded conditionally by the orchestrator).\r
\r
**Core rule:** After each task completes, a real user can do something they could not do after the previous task. If a task only "lays foundation," it is horizontal disguised as vertical — restructure.\r
\r
**Plan structure under MVP_MODE:**\r
\r
1. Frame the phase goal as a user story at the top of `PLAN.md`. The user story is sourced from the `**Goal:**` line in ROADMAP.md (set by `mvp-phase`). Emit it with bolded keywords:\r
\r
   ```\r
   ## Phase Goal\r
\r
   **As a** [user role], **I want to** [capability], **so that** [outcome].\r
   ```\r
\r
   Format rules from `@/home/giuice/desenv/virtual-office/.Codex/get-shit-done/references/user-story-template.md`:\r
   - All three slots required. If the ROADMAP `**Goal:**` line is not in user-story format, surface the discrepancy and ask the user to run `/gsd mvp-phase ${PHASE}` first — do not invent a story.\r
   - Bold the three keywords (`**As a**`, `**I want to**`, `**so that**`) when emitting to PLAN.md. The ROADMAP form does not use bolded keywords; the PLAN form does.\r
2. First task: failing end-to-end test for the happy path.\r
3. Second task: thinnest UI → API → DB slice that makes the test pass (stubs allowed for non-critical branches).\r
4. Third+ tasks: replace stubs with real implementations, add validation, error states, polish.\r
\r
**Mode is all-or-nothing per phase** (PRD decision Q1). Do not produce a plan that mixes vertical-slice tasks with horizontal layer tasks within the same phase.\r
\r
**Walking Skeleton mode** (`WALKING_SKELETON=true`, set by orchestrator for Phase 1 + new project under `--mvp`): The first deliverable is a Walking Skeleton — the thinnest possible end-to-end stack. In addition to `PLAN.md`, produce `SKELETON.md` using the template at `@/home/giuice/desenv/virtual-office/.Codex/get-shit-done/references/skeleton-template.md`. `SKELETON.md` records architectural decisions (framework, DB, auth, deployment, directory layout) that subsequent phases will build on without renegotiating.\r
\r
**Compatibility with TDD detection:** When both `MVP_MODE=true` and `workflow.tdd_mode=true`, every behavior-adding task uses `tdd="true"` and a `<behavior>` block, AND the task ordering follows the vertical-slice structure above. The first task is always a failing end-to-end test.\r
\r
## User Setup Detection\r
\r
For tasks involving external services, identify human-required configuration:\r
\r
External service indicators: New SDK (`stripe`, `@sendgrid/mail`, `twilio`, `openai`), webhook handlers, OAuth integration, `process.env.SERVICE_*` patterns.\r
\r
For each external service, determine:\r
1. **Env vars needed** — What secrets from dashboards?\r
2. **Account setup** — Does user need to create an account?\r
3. **Dashboard config** — What must be configured in external UI?\r
\r
Record in `user_setup` frontmatter. Only include what Codex literally cannot do. Do NOT surface in planning output — execute-plan handles presentation.\r
\r
</task_breakdown>\r
