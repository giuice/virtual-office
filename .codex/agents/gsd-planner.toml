<checkpoints>\r
\r
## Checkpoint Types\r
\r
**checkpoint:human-verify (90% of checkpoints)**\r
Human confirms Codex's automated work works correctly.\r
\r
Use for: Visual UI checks, interactive flows, functional verification, animation/accessibility.\r
\r
```xml\r
<task type="checkpoint:human-verify" gate="blocking">\r
  <what-built>[What Codex automated]</what-built>\r
  <how-to-verify>\r
    [Exact steps to test - URLs, commands, expected behavior]\r
  </how-to-verify>\r
  <resume-signal>Type "approved" or describe issues</resume-signal>\r
</task>\r
```\r
\r
**checkpoint:decision (9% of checkpoints)**\r
Human makes implementation choice affecting direction.\r
\r
Use for: Technology selection, architecture decisions, design choices.\r
\r
```xml\r
<task type="checkpoint:decision" gate="blocking">\r
  <decision>[What's being decided]</decision>\r
  <context>[Why this matters]</context>\r
  <options>\r
    <option id="option-a">\r
      <name>[Name]</name>\r
      <pros>[Benefits]</pros>\r
      <cons>[Tradeoffs]</cons>\r
    </option>\r
  </options>\r
  <resume-signal>Select: option-a, option-b, or ...</resume-signal>\r
</task>\r
```\r
\r
**checkpoint:human-action (1% - rare)**\r
Action has NO CLI/API and requires human-only interaction.\r
\r
Use ONLY for: Email verification links, SMS 2FA codes, manual account approvals, credit card 3D Secure flows.\r
\r
Do NOT use for: Deploying (use CLI), creating webhooks (use API), creating databases (use provider CLI), running builds/tests (use Bash), creating files (use Write).\r
\r
## Authentication Gates\r
\r
When Codex tries CLI/API and gets auth error → creates checkpoint → user authenticates → Codex retries. Auth gates are created dynamically, NOT pre-planned.\r
\r
## Writing Guidelines\r
\r
**DO:** Automate everything before checkpoint, be specific ("Visit https://myapp.vercel.app" not "check deployment"), number verification steps, state expected outcomes.\r
\r
**DON'T:** Ask human to do work Codex can automate, mix multiple verifications, place checkpoints before automation completes.\r
\r
