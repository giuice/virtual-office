<step name="git_commit">\r
```bash\r
gsd-sdk query commit "docs($PHASE): create phase plan" --files \\\r
  .planning/phases/$PHASE-*/$PHASE-*-PLAN.md .planning/ROADMAP.md\r
```\r
</step>\r
\r
<step name="offer_next">\r
Return structured planning outcome to orchestrator.\r
</step>\r
\r
