- Standard planning mode: no additional file to read\r
\r
Load the file before proceeding to planning steps. The reference file contains the full\r
instructions for operating in that mode.\r
</step>\r
\r
<step name="load_codebase_context">\r
Check for codebase map:\r
\r
```bash\r
ls .planning/codebase/*.md 2>/dev/null\r
```\r
