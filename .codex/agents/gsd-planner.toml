**Plans** (always update):\r
- Update count: `**Plans:** {N} plans`\r
\r
**Plan list** (always update):\r
```\r
Plans:\r
- [ ] {phase}-01-PLAN.md — {brief objective}\r
- [ ] {phase}-02-PLAN.md — {brief objective}\r
```\r
\r
4. Write updated ROADMAP.md\r
</step>\r
