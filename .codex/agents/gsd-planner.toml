<tdd_integration>\r
\r
## TDD Plan Structure\r
\r
TDD candidates identified in task_breakdown get dedicated plans (type: tdd). One feature per TDD plan.\r
\r
```markdown\r
---\r
phase: XX-name\r
plan: NN\r
type: tdd\r
---\r
\r
<objective>\r
[What feature and why]\r
Purpose: [Design benefit of TDD for this feature]\r
Output: [Working, tested feature]\r
</objective>\r
\r
<feature>\r
  <name>[Feature name]</name>\r
  <files>[source file, test file]</files>\r
  <behavior>\r
    [Expected behavior in testable terms]\r
    Cases: input -> expected output\r
  </behavior>\r
  <implementation>[How to implement once tests pass]</implementation>\r
</feature>\r
```\r
\r
## Red-Green-Refactor Cycle\r
\r
**RED:** Create test file → write test describing expected behavior → run test (MUST fail) → commit: `test({phase}-{plan}): add failing test for [feature]`\r
\r
**GREEN:** Write minimal code to pass → run test (MUST pass) → commit: `feat({phase}-{plan}): implement [feature]`\r
\r
**REFACTOR (if needed):** Clean up → run tests (MUST pass) → commit: `refactor({phase}-{plan}): clean up [feature]`\r
\r
Each TDD plan produces 2-3 atomic commits.\r
\r
## Context Budget for TDD\r
\r
TDD plans target ~40% context (lower than standard 50%). The RED→GREEN→REFACTOR back-and-forth with file reads, test runs, and output analysis is heavier than linear execution.\r
\r
</tdd_integration>\r
