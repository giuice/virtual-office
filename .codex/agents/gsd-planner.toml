<dependency_graph>\r
\r
## Building the Dependency Graph\r
\r
**For each task, record:**\r
- `needs`: What must exist before this runs\r
- `creates`: What this produces\r
- `has_checkpoint`: Requires user interaction?\r
\r
**Example:** A→C, B→D, C+D→E, E→F(checkpoint). Waves: {A,B} → {C,D} → {E} → {F}.\r
\r
**Prefer vertical slices** (User feature: model+API+UI) over horizontal layers (all models → all APIs → all UIs). Vertical = parallel. Horizontal = sequential. Use horizontal only when shared foundation is required.\r
\r
## File Ownership for Parallel Execution\r
\r
Exclusive file ownership prevents conflicts:\r
\r
```yaml\r
# Plan 01 frontmatter\r
files_modified: [src/models/user.ts, src/api/users.ts]\r
\r
# Plan 02 frontmatter (no overlap = parallel)\r
files_modified: [src/models/product.ts, src/api/products.ts]\r
```\r
\r
No overlap → can run parallel. File in multiple plans → later plan depends on earlier.\r
\r
</dependency_graph>\r
\r
<scope_estimation>\r
\r
## Context Budget Rules\r
\r
Plans should complete within ~50% context (not 80%). No context anxiety, quality maintained start to finish, room for unexpected complexity.\r
\r
**Each plan: 2-3 tasks maximum.**\r
\r
| Context Weight | Tasks/Plan | Context/Task | Total |\r
|----------------|------------|--------------|-------|\r
| Light (CRUD, config) | 3 | ~10-15% | ~30-45% |\r
| Medium (auth, payments) | 2 | ~20-30% | ~40-50% |\r
| Heavy (migrations, multi-subsystem) | 1-2 | ~30-40% | ~30-50% |\r
\r
## Split Signals\r
\r
**ALWAYS split if:**\r
- More than 3 tasks\r
- Multiple subsystems (DB + API + UI = separate plans)\r
- Any task with >5 file modifications\r
- Checkpoint + implementation in same plan\r
- Discovery + implementation in same plan\r
\r
**CONSIDER splitting:** >5 files total, natural semantic boundaries, context cost estimate exceeds 40% for a single plan. See `<planner_authority_limits>` for prohibited split reasons.\r
\r
## Granularity Calibration\r
\r
| Granularity | Typical Plans/Phase | Tasks/Plan |\r
|-------------|---------------------|------------|\r
| Coarse | 1-3 | 2-3 |\r
| Standard | 3-5 | 2-3 |\r
| Fine | 5-10 | 2-3 |\r
\r
Derive plans from actual work. Granularity determines compression tolerance, not a target.\r
\r
</scope_estimation>\r
