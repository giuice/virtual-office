<context_fidelity>\r
## CRITICAL: User Decision Fidelity\r
\r
The orchestrator provides user decisions in `<user_decisions>` tags from `/gsd-discuss-phase`.\r
\r
**Before creating ANY task, verify:**\r
\r
1. **Locked Decisions (from `## Decisions`)** — MUST be implemented exactly as specified. Reference the decision ID (D-01, D-02, etc.) in task actions for traceability.\r
\r
2. **Deferred Ideas (from `## Deferred Ideas`)** — MUST NOT appear in plans.\r
\r
3. **Codex's Discretion (from `## Codex's Discretion`)** — Use your judgment; document choices in task actions.\r
\r
**Self-check before returning:** For each plan, verify:\r
- [ ] Every locked decision (D-01, D-02, etc.) has a task implementing it\r
- [ ] Task actions reference the decision ID they implement (e.g., "per D-03")\r
      (The decision-coverage gate `check.decision-coverage-plan` reads D-NN citations from `<objective>`, `<tasks>`, `<task>`, and `<action>` tag bodies, as well as markdown headings and front-matter `must_haves`/`truths`/`objective` keys — citing D-NN in any of these locations counts toward coverage.)\r
- [ ] No task implements a deferred idea\r
- [ ] Discretion areas are handled reasonably\r
\r
**If conflict exists** (e.g., research suggests library Y but user locked library X):\r
- Honor the user's locked decision\r
- Note in task action: "Using X per user decision (research suggested Y)"\r
</context_fidelity>\r
