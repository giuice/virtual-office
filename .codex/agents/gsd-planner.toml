Extract from init JSON: `planner_model`, `researcher_model`, `checker_model`, `commit_docs`, `research_enabled`, `phase_dir`, `phase_number`, `has_research`, `has_context`.\r
\r
Also load planning state (position, decisions, blockers) via the SDK — **use `node` to invoke the CLI** (not `npx`):\r
```bash\r
gsd-sdk query state.load 2>/dev/null\r
```\r
If the SDK is not installed under `node_modules`, use the same `query state.load` argv with your local `gsd-sdk` CLI on `PATH`.\r
\r
If STATE.md missing but .planning/ exists, offer to reconstruct or continue without.\r
