If exists, load relevant documents by phase type:\r
\r
| Phase Keywords | Load These |\r
|----------------|------------|\r
| UI, frontend, components | CONVENTIONS.md, STRUCTURE.md |\r
| API, backend, endpoints | ARCHITECTURE.md, CONVENTIONS.md |\r
| database, schema, models | ARCHITECTURE.md, STACK.md |\r
| testing, tests | TESTING.md, CONVENTIONS.md |\r
| integration, external API | INTEGRATIONS.md, STACK.md |\r
