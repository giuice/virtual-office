\r
[What user needs to do/provide]\r
```\r
\r
Completed Tasks table gives continuation agent context. Commit hashes verify work was committed. Current Task provides precise continuation point.\r
</checkpoint_return_format>\r
\r
<continuation_handling>\r
If spawned as continuation agent (`<completed_tasks>` in prompt):\r
\r
1. Verify previous commits exist: `git log --oneline -5`\r
2. DO NOT redo completed tasks\r
3. Start from resume point in prompt\r
4. Handle based on checkpoint type: after human-action → verify it worked; after human-verify → continue; after decision → implement selected option\r
5. If another checkpoint hit → return with ALL completed tasks (previous + new)\r
</continuation_handling>\r
\r
<tdd_execution>\r
When executing task with `tdd="true"`:\r
\r
**1. Check test infrastructure** (if first TDD task): detect project type, install test framework if needed.\r
\r
**2. RED:** Read `<behavior>`, create test file, write failing tests, run (MUST fail), commit: `test({phase}-{plan}): add failing test for [feature]`\r
\r
**3. GREEN:** Read `<implementation>`, write minimal code to pass, run (MUST pass), commit: `feat({phase}-{plan}): implement [feature]`\r
\r
**4. REFACTOR (if needed):** Clean up, run tests (MUST still pass), commit only if changes: `refactor({phase}-{plan}): clean up [feature]`\r
\r
**Error handling:** RED doesn't fail ��� investigate. GREEN doesn't pass → debug/iterate. REFACTOR breaks → undo.\r
\r
## Plan-Level TDD Gate Enforcement (type: tdd plans)\r
\r
When the plan frontmatter has `type: tdd`, the entire plan follows the RED/GREEN/REFACTOR cycle as a single feature. Gate sequence is mandatory:\r
\r
**Fail-fast rule:** If a test passes unexpectedly during the RED phase (before any implementation), STOP. The feature may already exist or the test is not testing what you think. Investigate and fix the test before proceeding to GREEN. Do NOT skip RED by proceeding with a passing test.\r
\r
**Gate sequence validation:** After completing the plan, verify in git log:\r
1. A `test(...)` commit exists (RED gate)\r
2. A `feat(...)` commit exists after it (GREEN gate)\r
3. Optionally a `refactor(...)` commit exists after GREEN (REFACTOR gate)\r
\r
If RED or GREEN gate commits are missing, add a warning to SUMMARY.md under a `## TDD Gate Compliance` section.\r
</tdd_execution>\r
\r
## MVP+TDD Gate\r
\r
**When the orchestrator passes both `MVP_MODE=true` and `TDD_MODE=true`:** Before running the implementation step of any task with `tdd="true"`, run the runtime gate from `@/home/giuice/desenv/virtual-office/.Codex/get-shit-done/references/execute-mvp-tdd.md`. If the gate trips, halt and report — do NOT proceed to the implementation step.\r
\r
**Halt-and-report protocol:**\r
\r
1. Stop. Do not run the task's implementation step.\r
2. Emit the structured halt report defined in `references/execute-mvp-tdd.md` (header line, reason code, expected behavior, required next step).\r
3. Update `STATE.md` with `last_gate_trip: {plan_id}/{task_id}`.\r
4. Exit the current execution wave cleanly. Prior commits in the same wave stay — do not roll back.\r
\r
**Behavior-Adding Task detection** (the gate only fires when this predicate returns true): apply via the centralized verb instead of inlining the three checks:\r
\r
```bash\r
IS_BEHAVIOR_ADDING=$(gsd-sdk query task.is-behavior-adding "$TASK_FILE" --pick is_behavior_adding)\r
```\r
\r
The verb owns the canonical predicate (tdd="true" frontmatter AND `<behavior>` block AND non-test source files in `<files>`). Pure doc-only / config-only / test-only tasks return `false` and are exempt. Full result also exposes per-check breakdown (`checks.tdd_true`, `checks.has_behavior_block`, `checks.has_source_files`) and a human-readable `reason` — use these in the halt-and-report payload when the gate trips. See `references/execute-mvp-tdd.md` for halt protocol.\r
\r
**Mode is all-or-nothing per phase** (PRD decision Q1, inherited from Phase 1). The gate is either active for the whole phase or inactive for the whole phase — it cannot apply selectively to a subset of tasks within a phase.\r
\r
<task_commit_protocol>\r
After each task completes (verification passed, done criteria met), commit immediately.\r
\r
**0a. cwd-drift assertion (worktree mode only, MANDATORY before staging — #3097):**\r
A prior Bash call may have `cd`'d out of the worktree into the main repo. When that happens\r
`[ -f .git ]` is false (main repo's `.git` is a directory), silently skipping all worktree guards.\r
Capture the spawn-time toplevel via a sentinel on first commit, then verify on every subsequent commit:\r
```bash\r
WT_GIT_DIR=$(git rev-parse --git-dir 2>/dev/null)\r
case "$WT_GIT_DIR" in\r
  *.git/worktrees/*)\r
      SENTINEL="$WT_GIT_DIR/gsd-spawn-toplevel"\r
      [ ! -f "$SENTINEL" ] && git rev-parse --show-toplevel > "$SENTINEL" 2>/dev/null\r
      EXPECTED_TL=$(cat "$SENTINEL" 2>/dev/null)\r
      ACTUAL_TL=$(git rev-parse --show-toplevel 2>/dev/null)\r
      if [ -n "$EXPECTED_TL" ] && [ "$ACTUAL_TL" != "$EXPECTED_TL" ]; then\r
        echo "FATAL: cwd drifted from spawn-time worktree root (#3097)" >&2\r
        echo "  Spawn-time: $EXPECTED_TL" >&2\r
        echo "  Current:    $ACTUAL_TL" >&2\r
        echo "RECOVERY: cd \\"$EXPECTED_TL\\" before staging, then re-run this commit." >&2\r
        exit 1\r
      fi\r
    ;;\r
esac\r
```\r
\r
**0b. absolute-path safety (worktree mode only, MANDATORY before Edit/Write — #3099):**\r
Before any Edit or Write call that uses an absolute path, verify the path resolves inside the\r
current worktree. Absolute paths constructed from prior `pwd` output (orchestrator's cwd) will\r
resolve to the **main repo**, not the worktree — silently writing files to the wrong location.\r
```bash\r
# Obtain the canonical worktree root\r
WT_ROOT=$(git rev-parse --show-toplevel 2>/dev/null)\r
[ -z "$WT_ROOT" ] && { echo "FATAL: could not determine worktree root" >&2; exit 1; }\r
# Verify absolute path containment with boundary safety (not glob prefix which allows siblings)\r
if [[ "$ABS_PATH" != "$WT_ROOT" && "$ABS_PATH" != "$WT_ROOT/"* ]]; then\r
  echo "FATAL: $ABS_PATH is outside the worktree ($WT_ROOT) — use a relative path or recompute from WT_ROOT" >&2\r
  exit 1\r
fi\r
```\r
Prefer **relative paths** for all Edit/Write operations inside a worktree. When an absolute path\r
is unavoidable, always derive it from `git rev-parse --show-toplevel` run inside the worktree,\r
not from a `pwd` captured in the orchestrator context.\r
\r
**0. Pre-commit HEAD safety assertion (worktree mode only, MANDATORY before every commit — #2924):**\r
When running inside a Codex worktree (`.git` is a file, not a directory), assert HEAD is on a per-agent branch BEFORE staging or committing. If HEAD has drifted onto a protected ref, HALT — never self-recover via `git update-ref refs/heads/<protected>`:\r
```bash\r
if [ -f .git ]; then  # worktree\r
  HEAD_REF=$(git symbolic-ref --quiet HEAD || echo "DETACHED")\r
  ACTUAL_BRANCH=$(git rev-parse --abbrev-ref HEAD)\r
  # Deny-list: never commit on a protected ref.\r
  if [ "$HEAD_REF" = "DETACHED" ] || \\\r
     echo "$ACTUAL_BRANCH" | grep -Eq '^(main|master|develop|trunk|release/.*)$'; then\r
    echo "FATAL: refusing to commit — worktree HEAD is on '$ACTUAL_BRANCH' (expected per-agent branch)." >&2\r
    echo "DO NOT use 'git update-ref' to rewind the protected branch — surface as blocker (#2924)." >&2\r
    exit 1\r
  fi\r
  # Positive allow-list: HEAD must be on the canonical Codex worktree-agent\r
  # branch namespace (`worktree-agent-<id>`). This catches feature/* and any other\r
  # arbitrary branch that the deny-list would silently allow (#2924).\r
  if ! echo "$ACTUAL_BRANCH" | grep -Eq '^worktree-agent-[A-Za-z0-9._/-]+$'; then\r
    echo "FATAL: refusing to commit — worktree HEAD '$ACTUAL_BRANCH' is not in the worktree-agent-* namespace." >&2\r
    echo "Agent commits must live on per-agent branches; surface as blocker (#2924)." >&2\r
    exit 1\r
  fi\r
fi\r
```\r
\r
**1. Check modified files:** `git status --short`\r
\r
**2. Stage task-related files individually** (NEVER `git add .` or `git add -A`):\r
```bash\r
git add src/api/auth.ts\r
git add src/types/user.ts\r
```\r
\r
**3. Commit type:**\r
\r
| Type       | When                                            |\r
| ---------- | ----------------------------------------------- |\r
| `feat`     | New feature, endpoint, component                |\r
| `fix`      | Bug fix, error correction                       |\r
| `test`     | Test-only changes (TDD RED)                     |\r
| `refactor` | Code cleanup, no behavior change                |\r
| `perf`     | Performance improvement, no behavior change     |\r
| `docs`     | Documentation only                              |\r
| `style`    | Formatting, whitespace, no logic change         |\r
| `chore`    | Config, tooling, dependencies                   |\r
\r
**4. Commit:**\r
\r
**If `sub_repos` is configured (non-empty array from init context):** Use `commit-to-subrepo` to route files to their correct sub-repo:\r
```bash\r
gsd-sdk query commit-to-subrepo "{type}({phase}-{plan}): {concise task description}" --files file1 file2 ...\r
```\r
Returns JSON with per-repo commit hashes: `{ committed: true, repos: { "backend": { hash: "abc", files: [...] }, ... } }`. Record all hashes for SUMMARY.\r
\r
**Otherwise (standard single-repo):**\r
```bash\r
git commit -m "{type}({phase}-{plan}): {concise task description}\r
\r
- {key change 1}\r
- {key change 2}\r
"\r
```\r
\r
**5. Record hash:**\r
- **Single-repo:** `TASK_COMMIT=$(git rev-parse --short HEAD)` — track for SUMMARY.\r
- **Multi-repo (sub_repos):** Extract hashes from `commit-to-subrepo` JSON output (`repos.{name}.hash`). Record all hashes for SUMMARY (e.g., `backend@abc1234, frontend@def5678`).\r
\r
**6. Post-commit deletion check:** After recording the hash, verify the commit did not accidentally delete tracked files:\r
```bash\r
DELETIONS=$(git diff --diff-filter=D --name-only HEAD~1 HEAD 2>/dev/null || true)\r
if [ -n "$DELETIONS" ]; then\r
  echo "WARNING: Commit includes file deletions: $DELETIONS"\r
fi\r
```\r
Intentional deletions (e.g., removing a deprecated file as part of the task) are expected — document them in the Summary. Unexpected deletions are a Rule 1 bug: revert and fix before proceeding.\r
\r
**7. Check for untracked files:** After running scripts or tools, check `git status --short | grep '^??'`. For any new untracked files: commit if intentional, add to `.gitignore` if generated/runtime output. Never leave generated files untracked.\r
</task_commit_protocol>\r
\r
<destructive_git_prohibition>\r
**NEVER run `git clean` inside a worktree. This is an absolute rule with no exceptions.**\r
\r
When running as a parallel executor inside a git worktree, `git clean` treats files committed\r
on the feature branch as "untracked" — because the worktree branch was just created and has\r
not yet seen those commits in its own history. Running `git clean -fd` or `git clean -fdx`\r
will delete those files from the worktree filesystem. When the worktree branch is later merged\r
back, those deletions appear on the main branch, destroying prior-wave work (#2075, commit c6f4753).\r
\r
**Prohibited commands in worktree context:**\r
- `git clean` (any flags — `-f`, `-fd`, `-fdx`, `-n`, etc.)\r
- `git rm` on files not explicitly created by the current task\r
- `git checkout -- .` or `git restore .` (blanket working-tree resets that discard files)\r
- `git reset --hard` except inside the `<worktree_branch_check>` step at agent startup\r
- `git update-ref refs/heads/<protected>` (where protected is `main`, `master`,\r
  `develop`, `trunk`, or `release/*`). This is an absolute prohibition (#2924).\r
  If you discover that your worktree HEAD is attached to a protected branch and your\r
  commits landed there, **DO NOT** "recover" by force-rewinding the protected ref —\r
  that silently destroys concurrent commits in multi-active scenarios (parallel\r
  agents, user committing while you run). HALT and surface a blocker. The setup-time\r
  `<worktree_branch_check>` and per-commit `<pre_commit_head_assertion>` are the\r
  correct prevention; if either fails, the workflow MUST stop, not self-heal.\r
- `git push --force` / `git push -f` to any branch you did not create.\r
- `git stash`, `git stash push`, `git stash pop`, `git stash apply`, `git stash drop`\r
  (and any other `git stash` subcommand). **The stash list is shared across the\r
  main checkout and every linked worktree** — git stores stashes at `refs/stash`\r
  inside the parent `.git/` directory, not inside the per-worktree\r
  `.git/worktrees/<name>/` subdirectory. From inside your worktree, `git stash list`\r
  shows the global stack with no indication that entries originated elsewhere, and\r
  `git stash pop` pops the top of that global stack regardless of which worktree\r
  pushed it. Running `git stash pop` after a `git stash` that printed "No local\r
  changes to save" will silently apply WIP from a sibling worktree's prior\r
  session — typically producing UU/UD merge-conflict states, phantom untracked\r
  files, and a contaminated working tree that violates the `isolation="worktree"`\r
  invariant of your execution (#3542).\r
\r
  **Sanctioned alternatives** when you need to set aside or inspect work without\r
  touching `refs/stash`:\r
\r
  - **Move WIP off the working tree:** commit it to a throwaway branch you own\r
    (e.g. `git checkout -b scratch-/<task>-wip && git add -A && git commit -m "wip"`),\r
    then `git checkout <your-worktree-branch>` to return to your task. The\r
    throwaway branch lives in the per-worktree branch namespace and never\r
    collides with sibling worktrees.\r
  - **Read-only inspection of another ref:** use `git show <ref>:<path>` to\r
    print a file at any ref, or `git diff <ref> -- <path>` to compare. Neither\r
    mutates `refs/stash` nor leaks state across worktrees.\r
\r
If you need to discard changes to a specific file you modified during this task, use:\r
```bash\r
git checkout -- path/to/specific/file\r
```\r
Never use blanket reset or clean operations that affect the entire working tree.\r
\r
To inspect what is untracked vs. genuinely new, use `git status --short` and evaluate each\r
file individually. If a file appears untracked but is not part of your task, leave it alone.\r
</destructive_git_prohibition>\r
