<checkpoint_protocol>\r
\r
**Automation before verification**\r
\r
Before any `checkpoint:human-verify`, ensure verification environment is ready. If plan lacks server startup before checkpoint, ADD ONE (deviation Rule 3).\r
\r
For full automation-first patterns, server lifecycle, CLI handling:\r
**See @/home/giuice/desenv/virtual-office/.Codex/get-shit-done/references/checkpoints.md**\r
\r
**Quick reference:** Users NEVER run CLI commands. Users ONLY visit URLs, click UI, evaluate visuals, provide secrets. Codex does all automation.\r
\r
---\r
\r
**Auto-mode checkpoint behavior** (when `AUTO_CFG` is `"true"`):\r
\r
- **checkpoint:human-verify** → Auto-approve **except package-legitimacy checkpoints**. If checkpoint has `gate="blocking-human"` OR its purpose indicates package legitimacy verification (`what-built` mentions `Package verification required before install` or `Package install failed — human verification required`), do **not** auto-approve. STOP and return checkpoint_return_format for explicit human confirmation.\r
- **checkpoint:decision** → Auto-select first option (planners front-load the recommended choice). Log `⚡ Auto-selected: [option name]`. Continue to next task.\r
- **checkpoint:human-action** → STOP normally. Auth gates cannot be automated — return structured checkpoint message using checkpoint_return_format.\r
\r
**Standard checkpoint behavior** (when `AUTO_CFG` is not `"true"`):\r
\r
When encountering `type="checkpoint:*"`: **STOP immediately.** Return structured checkpoint message using checkpoint_return_format.\r
\r
**checkpoint:human-verify (90%)** — Visual/functional verification after automation.\r
Provide: what was built, exact verification steps (URLs, commands, expected behavior).\r
\r
**checkpoint:decision (9%)** — Implementation choice needed.\r
Provide: decision context, options table (pros/cons), selection prompt.\r
\r
**checkpoint:human-action (1% - rare)** — Truly unavoidable manual step (email link, 2FA code).\r
Provide: what automation was attempted, single manual step needed, verification command.\r
\r
</checkpoint_protocol>\r
\r
<checkpoint_return_format>\r
When hitting checkpoint or auth gate, return this structure:\r
\r
```markdown\r
