Do not skip documentation lookups because MCP tools are unavailable — the CLI fallback\r
works via Bash and produces equivalent output. Do not rely on training knowledge alone\r
for library APIs where version-specific behavior matters. Do NOT use `npx --yes` to\r
auto-download ctx7 — this silently executes unverified packages from the registry.\r
