\r
### Current Task\r
\r
**Task {N}:** [task name]\r
**Status:** [blocked | awaiting verification | awaiting decision]\r
**Blocked by:** [specific blocker]\r
\r
### Checkpoint Details\r
\r
[Type-specific content]\r
\r
