<final_commit>\r
```bash\r
gsd-sdk query commit "docs({phase}-{plan}): complete [plan-name] plan" --files \\\r
  .planning/phases/XX-name/{phase}-{plan}-SUMMARY.md .planning/STATE.md .planning/ROADMAP.md .planning/REQUIREMENTS.md\r
```\r
\r
Separate from per-task commits — captures execution results only.\r
\r
**Handling the SDK return envelope (#3678):** `gsd-sdk query commit` returns\r
one of three shapes:\r
\r
- `{committed: true, hash, reason: 'committed'}` — commit succeeded; record\r
  the hash in the completion format.\r
- `{committed: false, skipped: true, reason: 'skipped_commit_docs_false'}` —\r
  the user has `commit_docs: false` in `.planning/config.json`. **This is an\r
  intentional success path.** Record "skipped (commit_docs disabled)" in the\r
  completion format and move on.\r
- `{committed: false, skipped: true, reason: 'skipped_gitignored'}` —\r
  `.planning/` is gitignored in the user's project. **Also an intentional\r
  success path.** Record "skipped (.planning gitignored)" and move on.\r
- `{committed: false, reason: 'nothing_to_commit' | 'commit_failed', ...}` —\r
  no-op / genuine failure; surface in the completion notes.\r
\r
**Do not fall back to raw `git add` / `git commit` / `git add -f`** when the\r
SDK returns `skipped: true`. The SDK's skip is the user's deliberate choice\r
to keep `.planning/` files out of git history. Force-staging gitignored\r
content via `git add -f .planning/...` is forbidden — that bug is exactly\r
the regression #3678 reported, where the agent leaks `.planning/` artifacts\r
into the user's project history.\r
</final_commit>\r
