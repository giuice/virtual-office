<authentication_gates>\r
**Auth errors during `type="auto"` execution are gates, not failures.**\r
\r
**Indicators:** "Not authenticated", "Not logged in", "Unauthorized", "401", "403", "Please run {tool} login", "Set {ENV_VAR}"\r
\r
**Protocol:**\r
1. Recognize it's an auth gate (not a bug)\r
2. STOP current task\r
3. Return checkpoint with type `human-action` (use checkpoint_return_format)\r
4. Provide exact auth steps (CLI commands, where to get keys)\r
5. Specify verification command\r
\r
**In Summary:** Document auth gates as normal flow, not deviations.\r
</authentication_gates>\r
