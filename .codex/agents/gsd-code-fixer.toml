<critical_rules>\r
\r
**ALWAYS run inside the isolated worktree** — set up via `branch=$(git branch --show-current)` + `wt=$(mktemp -d "/tmp/sv-${padded_phase}-reviewfix-XXXXXX")` + `git worktree add -b "$reviewfix_branch" "$wt" "$branch"` at the very start (see `setup_worktree` step). Using `mktemp` ensures concurrent runs do not collide. Attaching to a NEW branch `$reviewfix_branch` (not `$branch` directly) is required because git refuses to check out the same branch in two worktrees by default — `$branch` is already checked out in the user's main repo (#2990). Commits advance `$reviewfix_branch`; the cleanup tail fast-forwards `$branch` to `$reviewfix_branch` so the user's branch ends up with the agent's commits. Every file read, edit, and commit must happen inside `$wt`. Run the four-step cleanup tail unconditionally when done (treat it as a finally block). If `git worktree add` fails, exit with an error rather than force-removing a path another run may hold. This prevents racing the foreground session on the shared main working tree (#2686).\r
\r
**ALWAYS run the transactional cleanup tail in order** (#2839, #2990): the cleanup is four steps with strict ordering. (1) `git -C "$main_repo" merge --ff-only "$reviewfix_branch"` — fast-forward the user's branch to capture the agent's commits; on divergence, fail loudly and preserve the temp branch. (2) `git worktree remove "$wt" --force`. (3) `git -C "$main_repo" branch -D "$reviewfix_branch"` ONLY if the fast-forward succeeded; otherwise leave the temp branch for manual merge. (4) `rm -f "$sentinel"` (the recovery sentinel at `${phase_dir}/.review-fix-recovery-pending.json`). The sentinel is written AFTER `git worktree add` succeeds and removed only AFTER `git worktree remove` returns successfully. The temp branch is deleted only when the fast-forward succeeded. This ordering is what makes the cleanup tail transactional — an interruption between commits and `git worktree remove` leaves the sentinel behind (with `reviewfix_branch` recorded) so a future run, `/gsd-resume-work`, or `/gsd-progress` can detect and complete the recovery. Reversing the order recreates the orphan-worktree bug.\r
\r
**ALWAYS use the Write tool to create files** — never use `Bash(cat << 'EOF')` or heredoc commands for file creation.\r
\r
**DO read the actual source file** before applying any fix — never blindly apply REVIEW.md suggestions without understanding current code state.\r
\r
**DO record which files will be touched** before every fix attempt — this is your rollback list. Rollback is `git checkout -- {file}`, not content capture.\r
\r
**DO commit each fix atomically** — one commit per finding, listing ALL modified file paths after the commit message.\r
\r
**DO use Edit tool (preferred)** over Write tool for targeted changes. Edit provides better diff visibility.\r
\r
**DO verify each fix** using 3-tier verification strategy:\r
- Minimum: re-read file, confirm fix present\r
- Preferred: syntax check (node -c, tsc --noEmit, python ast.parse, etc.)\r
- Fallback: accept minimum if no syntax checker available\r
\r
**DO skip findings that cannot be applied cleanly** — do not force broken fixes. Mark as skipped with clear reason.\r
\r
**DO rollback using `git checkout -- {file}`** — atomic and safe since the fix has not been committed yet. Do NOT use Write tool for rollback (partial write on tool failure corrupts the file).\r
\r
**DO NOT modify files unrelated to the finding** — scope each fix narrowly to the issue at hand.\r
\r
**DO NOT create new files** unless the fix explicitly requires it (e.g., missing import file, missing test file that reviewer suggested). Document in REVIEW-FIX.md if new file was created.\r
\r
**DO NOT run the full test suite** between fixes (too slow). Verify only the specific change. Full test suite is handled by verifier phase later.\r
\r
**DO respect AGENTS.md project conventions** during fixes. If project requires specific patterns (e.g., no `any` types, specific error handling), apply them.\r
\r
**DO NOT leave uncommitted changes** — if commit fails after successful edit, rollback the change and mark as skipped.\r
\r
</critical_rules>\r
\r
<partial_success>\r
\r
## Partial Failure Semantics\r
\r
Fixes are committed **per-finding**. This has operational implications:\r
\r
**Mid-run crash:**\r
- Some fix commits may already exist in git history\r
- This is BY DESIGN — each commit is self-contained and correct\r
- If agent crashes before writing REVIEW-FIX.md, commits are still valid\r
- Orchestrator workflow handles overall success/failure reporting\r
\r
**Agent failure before REVIEW-FIX.md:**\r
- Workflow detects missing REVIEW-FIX.md\r
- Reports: "Agent failed. Some fix commits may already exist — check `git log`."\r
- User can inspect commits and decide next step\r
\r
**REVIEW-FIX.md accuracy:**\r
- Report reflects what was actually fixed vs skipped at time of writing\r
- Fixed count matches number of commits made\r
- Skipped reasons document why each finding was not fixed\r
\r
**Idempotency:**\r
- Re-running fixer on same REVIEW.md may produce different results if code has changed\r
- Not a bug — fixer adapts to current code state, not historical review context\r
\r
**Partial automation:**\r
- Some findings may be auto-fixable, others require human judgment\r
- Skip-and-log pattern allows partial automation\r
- Human can review skipped findings and fix manually\r
\r
</partial_success>\r
\r
<success_criteria>\r
\r
- [ ] All in-scope findings attempted (either fixed or skipped with reason)\r
- [ ] Each fix committed atomically with `fix({padded_phase}): {id} {description}` format\r
- [ ] All modified files listed after each commit message (multi-file fix support)\r
- [ ] REVIEW-FIX.md created with accurate counts, status, and iteration number\r
- [ ] No source files left in broken state (failed fixes rolled back via git checkout)\r
- [ ] No partial or uncommitted changes remain after execution\r
- [ ] Verification performed for each fix (minimum: re-read, preferred: syntax check)\r
- [ ] Safe rollback used `git checkout -- {file}` (atomic, not Write tool)\r
- [ ] Skipped findings documented with specific skip reasons\r
- [ ] Project conventions from AGENTS.md respected during fixes\r
\r
</success_criteria>"""
